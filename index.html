<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>PLSilva Engenharia</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

input, select, textarea, button { font-family: inherit; font-size: 16px; }

.safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const SURL = "https://sreatrvvgxooddhkbago.supabase.co";
const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyZWF0cnZ2Z3hvb2RkaGtiYWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzUxNjUsImV4cCI6MjA5NjAxMTE2NX0.SOS84j22J7lsIzTaUu-SheVV__d87_YUhhP24puKZvU";
const sb = supabase.createClient(SURL, SKEY);

const isMobile = window.innerWidth < 768;

const C = {
  bg:"#0a0a0a",surface:"#111111",surfaceHover:"#181818",border:"#222222",
  text:"#f0f0f0",textMuted:"#888888",textFaint:"#3a3a3a",
  accent:"#E8A020",accentDim:"#2a1a00",accentText:"#F5C060",
  success:"#22C55E",warning:"#F59E0B",danger:"#EF4444",
  info:"#3B82F6",infoBg:"#0a1a3a",graphite:"#161616"
};
const SC = {
  "Orcamento":{color:"#64748b",bg:"#1e2533"},"Contratado":{color:"#3B82F6",bg:"#0a1a3a"},
  "Em desenvolvimento":{color:"#8B5CF6",bg:"#1a0a3a"},"Revisao":{color:"#F59E0B",bg:"#2a1a00"},
  "Protocolado":{color:"#06B6D4",bg:"#001a2a"},"Em analise":{color:"#F97316",bg:"#2a1000"},
  "Aprovado":{color:"#22C55E",bg:"#0a2e1a"},"Concluido":{color:"#10B981",bg:"#0a2520"},
};
const fmt = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);
const fmtD = d => d ? new Date(d+"T12:00:00").toLocaleDateString("pt-BR") : "-";
const TODAY = new Date();
const PASTAS = ["Contrato","ART","PDF","DWG","Memorial","Aprovacao","Prefeitura","CBMMG","Foto","Outro"];
const TIPO_ICON = {pdf:"📄",dwg:"📐",docx:"📝",xlsx:"📊",jpg:"🖼️",png:"🖼️",zip:"📦"};
const TIPO_COR = {pdf:"#EF4444",dwg:"#3B82F6",docx:"#8B5CF6",xlsx:"#22C55E",jpg:"#F59E0B",png:"#F59E0B",zip:"#888"};

const Badge = ({text}) => {
  const cfg=SC[text]||{color:"#888",bg:"#1a1a1a"};
  return <span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:700,color:cfg.color,background:cfg.bg,border:`1px solid ${cfg.color}33`,whiteSpace:"nowrap"}}>{text}</span>;
};

const StatCard = ({label,value,sub,icon,color=C.accent,hl}) => (
  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px",display:"flex",flexDirection:"column",gap:4,borderTop:hl?`2px solid ${color}`:`1px solid ${C.border}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:10,color:C.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</span>
      <span style={{fontSize:16}}>{icon}</span>
    </div>
    <div style={{fontSize:20,fontWeight:800,color:C.text}}>{value}</div>
    {sub&&<div style={{fontSize:10,color:C.textMuted}}>{sub}</div>}
  </div>
);

const Btn = ({children,onClick,style={},primary,small,danger,full}) => (
  <button onClick={onClick} style={{background:primary?C.accent:danger?C.danger:C.border,color:primary?"#000":C.text,border:"none",borderRadius:10,padding:small?"10px 16px":"14px 20px",fontSize:small?13:15,fontWeight:700,cursor:"pointer",width:full?"100%":"auto",minHeight:44,...style}}>{children}</button>
);

const Inp = ({value,onChange,placeholder,type="text"}) => (
  <input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%",padding:"14px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:16,outline:"none",boxSizing:"border-box",minHeight:48}}
    onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
);

const Sel = ({value,onChange,options}) => (
  <select value={value||""} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",padding:"14px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:16,outline:"none",cursor:"pointer",minHeight:48}}>
    <option value="">Selecione...</option>
    {options.map(o=><option key={o.value||o} value={o.value!==undefined?o.value:o}>{o.label||o}</option>)}
  </select>
);

const Fld = ({label,children}) => (
  <div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:12,fontWeight:700,color:C.textMuted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</label>
    {children}
  </div>
);

const Modal = ({title,onClose,children}) => (
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.surface,borderRadius:"20px 20px 0 0",width:"100%",maxHeight:"90vh",overflowY:"auto",padding:"24px 20px",paddingBottom:"calc(24px + env(safe-area-inset-bottom, 20px))"}}>
      <div style={{width:40,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h3 style={{margin:0,fontSize:18,fontWeight:800,color:C.text}}>{title}</h3>
        <button onClick={onClose} style={{background:C.border,border:"none",borderRadius:8,color:C.text,width:36,height:36,fontSize:20,cursor:"pointer"}}>×</button>
      </div>
      {children}
    </div>
  </div>
);

const Loading = () => <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:60,color:C.textMuted,fontSize:14}}>Carregando...</div>;

const PBar = ({value,max}) => {
  const pct=max>0?Math.min(100,Math.round((value/max)*100)):0;
  return <div style={{background:C.border,borderRadius:4,height:6}}><div style={{width:`${pct}%`,height:"100%",background:C.accent,borderRadius:4}}/></div>;
};

const Dashboard = ({clients,projects,laudos,receivables,payables}) => {
  const pendRec=receivables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const pendPay=payables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const monRec=receivables.filter(r=>r.status==="Recebido").reduce((s,r)=>s+r.value,0);
  const monExp=payables.filter(r=>r.status==="Pago").reduce((s,r)=>s+r.value,0);
  const active=projects.filter(p=>!["Concluido","Orcamento"].includes(p.status));
  return(<div style={{padding:"0 0 20px"}}>
    <h1 style={{fontSize:22,fontWeight:900,color:C.text,margin:"0 0 4px"}}>Dashboard</h1>
    <p style={{color:C.textMuted,margin:"0 0 20px",fontSize:13}}>{TODAY.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"})}</p>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
      <StatCard label="Projetos" value={active.length} sub="Ativos" icon="📐" hl/>
      <StatCard label="Clientes" value={clients.length} sub="Cadastrados" icon="👥" color={C.info} hl/>
      <StatCard label="Receita" value={fmt(monRec)} sub="Recebida" icon="💰" color={C.success} hl/>
      <StatCard label="A Receber" value={fmt(pendRec)} sub="Pendente" icon="📥" color={C.accentText} hl/>
    </div>
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:16}}>
      <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:800,color:C.text}}>Projetos Recentes</h3>
      {projects.slice(0,4).map(p=>(
        <div key={p.id} style={{padding:"12px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><p style={{margin:0,fontSize:14,fontWeight:700,color:C.text}}>{p.code}</p><p style={{margin:0,fontSize:12,color:C.textMuted}}>{p.type}</p></div>
          <Badge text={p.status}/>
        </div>
      ))}
      {projects.length===0&&<p style={{color:C.textMuted,fontSize:13}}>Nenhum projeto cadastrado</p>}
    </div>
    {(pendRec>0||pendPay>0)&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
      <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:800,color:C.text}}>⚡ Alertas</h3>
      {receivables.filter(r=>r.status==="Pendente").slice(0,2).map((r,i)=>(
        <div key={i} style={{padding:"10px 12px",borderRadius:8,background:C.bg,border:`1px solid ${C.success}33`,borderLeft:`3px solid ${C.success}`,marginBottom:8}}>
          <p style={{margin:0,fontSize:13,color:C.text,fontWeight:600}}>A receber: {fmt(r.value)}</p>
          <p style={{margin:0,fontSize:11,color:C.textMuted}}>Vence {fmtD(r.due_date)}</p>
        </div>
      ))}
    </div>}
  </div>);
};

const Clients = ({clients,projects,laudos,receivables,reload}) => {
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(false);
  const [sel,setSel]=useState(null);
  const [form,setForm]=useState({});
  const [loading,setLoading]=useState(false);
  const list=clients.filter(c=>c.name?.toLowerCase().includes(search.toLowerCase())||c.doc?.includes(search));
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!form.name)return alert("Nome obrigatorio!");
    setLoading(true);
    const d={name:form.name,type:form.type||"PF",doc:form.doc,phone:form.phone,email:form.email,city:form.city,state:form.state||"MG",address:form.address,obs:form.obs};
    if(form.id){await sb.from("clients").update(d).eq("id",form.id);}else{await sb.from("clients").insert(d);}
    await reload();setLoading(false);setModal(false);setSel(null);
  };
  const del=async(id)=>{if(!confirm("Excluir?"))return;await sb.from("clients").delete().eq("id",id);await reload();setSel(null);};

  if(sel){
    const sp=projects.filter(p=>p.client_id===sel.id);
    const totalR=receivables.filter(r=>r.client_id===sel.id&&r.status==="Recebido").reduce((s,r)=>s+r.value,0);
    return(<div>
      <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:C.accent,fontSize:16,cursor:"pointer",marginBottom:16,padding:0}}>← Voltar</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div><h1 style={{fontSize:20,fontWeight:900,color:C.text,margin:"0 0 4px"}}>{sel.name}</h1><p style={{color:C.textMuted,margin:0,fontSize:13}}>{sel.doc}</p></div>
        <Btn small primary onClick={()=>{setForm({...sel});setModal(true);}}>Editar</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
        <StatCard label="Projetos" value={sp.length} icon="📐"/>
        <StatCard label="Laudos" value={laudos.filter(l=>l.client_id===sel.id).length} icon="📋" color={C.info}/>
        <StatCard label="Recebido" value={fmt(totalR).replace("R$","")} icon="💰" color={C.success}/>
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:12}}>
        <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:700,color:C.text}}>Contato</h3>
        {[["📞",sel.phone],["📧",sel.email],["📍",sel.address],["🏙️",`${sel.city||""}/${sel.state||""}`]].map(([ic,v])=>(
          v?<div key={ic} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:18}}>{ic}</span><span style={{fontSize:13,color:C.text}}>{v}</span>
          </div>:null
        ))}
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
        <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:700,color:C.text}}>Projetos</h3>
        {sp.length===0?<p style={{color:C.textMuted,fontSize:13}}>Nenhum projeto</p>:sp.map(p=>(
          <div key={p.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><p style={{margin:0,fontSize:14,fontWeight:700,color:C.text}}>{p.code}</p><p style={{margin:0,fontSize:12,color:C.textMuted}}>{p.type}</p></div>
            <Badge text={p.status}/>
          </div>
        ))}
      </div>
      {modal&&<Modal title="Editar Cliente" onClose={()=>setModal(false)}>
        <Fld label="Nome"><Inp value={form.name||""} onChange={sf("name")}/></Fld>
        <Fld label="Tipo"><Sel value={form.type||""} onChange={sf("type")} options={[{value:"PF",label:"Pessoa Fisica"},{value:"PJ",label:"Pessoa Juridica"}]}/></Fld>
        <Fld label="CPF/CNPJ"><Inp value={form.doc||""} onChange={sf("doc")}/></Fld>
        <Fld label="Telefone"><Inp value={form.phone||""} onChange={sf("phone")}/></Fld>
        <Fld label="Email"><Inp value={form.email||""} onChange={sf("email")}/></Fld>
        <Fld label="Cidade"><Inp value={form.city||""} onChange={sf("city")}/></Fld>
        <Btn full primary onClick={save} style={{marginTop:8}}>{loading?"Salvando...":"Salvar"}</Btn>
      </Modal>}
    </div>);
  }

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:0}}>Clientes</h2>
      <Btn small primary onClick={()=>{setForm({type:"PF",state:"MG"});setModal(true);}}>+ Novo</Btn>
    </div>
    <div style={{marginBottom:16}}><Inp value={search} onChange={setSearch} placeholder="Buscar cliente..."/></div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {list.map(c=>(
        <div key={c.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,cursor:"pointer"}} onClick={()=>setSel(c)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{margin:0,fontSize:15,fontWeight:700,color:C.text}}>{c.name}</p>
              <p style={{margin:"2px 0 0",fontSize:12,color:C.textMuted}}>{c.doc} · {c.city}/{c.state}</p>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:11,padding:"2px 8px",borderRadius:4,background:c.type==="PJ"?C.infoBg:"#1a1a1a",color:c.type==="PJ"?C.info:C.textMuted,fontWeight:700}}>{c.type}</span>
              <span style={{color:C.textMuted,fontSize:18}}>›</span>
            </div>
          </div>
        </div>
      ))}
      {list.length===0&&<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum cliente</div>}
    </div>
    {modal&&<Modal title="Novo Cliente" onClose={()=>setModal(false)}>
      <Fld label="Nome Completo"><Inp value={form.name||""} onChange={sf("name")} placeholder="Nome"/></Fld>
      <Fld label="Tipo"><Sel value={form.type||""} onChange={sf("type")} options={[{value:"PF",label:"Pessoa Fisica"},{value:"PJ",label:"Pessoa Juridica"}]}/></Fld>
      <Fld label="CPF/CNPJ"><Inp value={form.doc||""} onChange={sf("doc")}/></Fld>
      <Fld label="Telefone"><Inp value={form.phone||""} onChange={sf("phone")} placeholder="(34) 99999-9999"/></Fld>
      <Fld label="Email"><Inp value={form.email||""} onChange={sf("email")}/></Fld>
      <Fld label="Endereco"><Inp value={form.address||""} onChange={sf("address")}/></Fld>
      <Fld label="Cidade"><Inp value={form.city||""} onChange={sf("city")}/></Fld>
      <Btn full primary onClick={save} style={{marginTop:8}}>{loading?"Salvando...":"Salvar Cliente"}</Btn>
    </Modal>}
  </div>);
};

const Projects = ({projects,clients,receivables,reload}) => {
  const [filter,setFilter]=useState("Todos");
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [loading,setLoading]=useState(false);
  const PSTYPES=["Arquitetonico","Estrutural","Hidrossanitario","Eletrico","PPCI","SPDA","Regularizacao","Compatibilizacao"];
  const STATUSES=["Orcamento","Contratado","Em desenvolvimento","Revisao","Protocolado","Em analise","Aprovado","Concluido"];
  const filtered=filter==="Todos"?projects:projects.filter(p=>p.status===filter);
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!form.code||!form.client_id)return alert("Codigo e cliente obrigatorios!");
    setLoading(true);
    const d={code:form.code,client_id:+form.client_id,type:form.type,responsible:form.responsible,value:+form.value||0,start_date:form.start_date||null,deadline:form.deadline||null,status:form.status||"Orcamento",description:form.description};
    if(form.id){await sb.from("projects").update(d).eq("id",form.id);}else{await sb.from("projects").insert(d);}
    await reload();setLoading(false);setModal(false);
  };
  const del=async(id)=>{if(!confirm("Excluir?"))return;await sb.from("projects").delete().eq("id",id);await reload();};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:0}}>Projetos</h2>
      <Btn small primary onClick={()=>{setForm({status:"Orcamento",type:"Arquitetonico"});setModal(true);}}>+ Novo</Btn>
    </div>
    <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
      {["Todos",...STATUSES].map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:"8px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:`1px solid ${filter===s?C.accent:C.border}`,background:filter===s?C.accentDim:"transparent",color:filter===s?C.accentText:C.textMuted,whiteSpace:"nowrap",minHeight:36}}>{s}</button>)}
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {filtered.map(p=>{
        const cl=clients.find(c=>c.id===p.client_id);
        const recv=receivables.filter(r=>r.project_id===p.id&&r.status==="Recebido").reduce((s,r)=>s+r.value,0);
        return(<div key={p.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div><span style={{fontFamily:"monospace",fontSize:11,color:C.accent}}>{p.code}</span><h3 style={{margin:"3px 0 0",fontSize:15,fontWeight:800,color:C.text}}>{p.type}</h3></div>
            <Badge text={p.status}/>
          </div>
          <p style={{margin:"0 0 2px",fontSize:14,color:C.text,fontWeight:600}}>{cl?.name||"-"}</p>
          <p style={{margin:"0 0 12px",fontSize:12,color:C.textMuted}}>{p.responsible}</p>
          <PBar value={recv} max={p.value||1}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:10,alignItems:"center"}}>
            <span style={{fontSize:14,fontWeight:800,color:C.success}}>{fmt(p.value)}</span>
            <div style={{display:"flex",gap:12}}>
              <button onClick={()=>{setForm({...p,client_id:String(p.client_id),value:String(p.value)});setModal(true);}} style={{background:"none",border:"none",cursor:"pointer",color:C.info,fontSize:20,padding:4}}>✏️</button>
              <button onClick={()=>del(p.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.danger,fontSize:20,padding:4}}>🗑️</button>
            </div>
          </div>
        </div>);
      })}
      {filtered.length===0&&<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum projeto</div>}
    </div>
    {modal&&<Modal title={form.id?"Editar Projeto":"Novo Projeto"} onClose={()=>setModal(false)}>
      <Fld label="Codigo"><Inp value={form.code||""} onChange={sf("code")} placeholder="PRJ-2024-001"/></Fld>
      <Fld label="Cliente"><Sel value={form.client_id||""} onChange={sf("client_id")} options={clients.map(c=>({value:c.id,label:c.name}))}/></Fld>
      <Fld label="Tipo"><Sel value={form.type||""} onChange={sf("type")} options={PSTYPES}/></Fld>
      <Fld label="Status"><Sel value={form.status||""} onChange={sf("status")} options={STATUSES}/></Fld>
      <Fld label="Responsavel"><Inp value={form.responsible||""} onChange={sf("responsible")}/></Fld>
      <Fld label="Valor (R$)"><Inp value={form.value||""} onChange={sf("value")} type="number"/></Fld>
      <Fld label="Prazo"><Inp value={form.deadline||""} onChange={sf("deadline")} type="date"/></Fld>
      <Fld label="Descricao"><textarea value={form.description||""} onChange={e=>sf("description")(e.target.value)} rows={3} style={{width:"100%",padding:14,background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:16,outline:"none",resize:"none",boxSizing:"border-box"}}/></Fld>
      <Btn full primary onClick={save} style={{marginTop:8}}>{loading?"Salvando...":"Salvar Projeto"}</Btn>
    </Modal>}
  </div>);
};

const Documentos = ({projects}) => {
  const [docs,setDocs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [uploading,setUploading]=useState(false);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({project_id:"",pasta:"Contrato"});
  const [file,setFile]=useState(null);
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const loadDocs=async()=>{setLoading(true);const{data}=await sb.from("documentos").select("*").order("created_at",{ascending:false});setDocs(data||[]);setLoading(false);};
  useEffect(()=>{loadDocs();},[]);
  const upload=async()=>{
    if(!file||!form.project_id)return alert("Selecione projeto e arquivo!");
    setUploading(true);
    const ext=file.name.split(".").pop().toLowerCase();
    const path=`${form.project_id}/${form.pasta}/${Date.now()}_${file.name}`;
    const{error}=await sb.storage.from("documentos").upload(path,file);
    if(error){alert("Erro: "+error.message);setUploading(false);return;}
    const{data:u}=sb.storage.from("documentos").getPublicUrl(path);
    await sb.from("documentos").insert({project_id:+form.project_id,pasta:form.pasta,nome:file.name,tipo:ext,tamanho:file.size,url:u.publicUrl,path});
    await loadDocs();setUploading(false);setModal(false);setFile(null);setForm({project_id:"",pasta:"Contrato"});
  };
  const del=async(doc)=>{if(!confirm("Excluir?"))return;await sb.storage.from("documentos").remove([doc.path]);await sb.from("documentos").delete().eq("id",doc.id);await loadDocs();};
  const fmtSize=b=>{if(!b)return "-";if(b>1024*1024)return`${(b/1024/1024).toFixed(1)} MB`;return`${(b/1024).toFixed(0)} KB`;};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:0}}>Documentos</h2>
      <Btn small primary onClick={()=>setModal(true)}>+ Upload</Btn>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {loading?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Carregando...</div>:
      docs.length===0?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum documento</div>:
      docs.map(doc=>{
        const ext=doc.tipo||"pdf";
        const proj=projects.find(p=>p.id===doc.project_id);
        return(<div key={doc.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:44,height:44,borderRadius:10,background:(TIPO_COR[ext]||"#888")+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{TIPO_ICON[ext]||"📄"}</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.nome}</p>
            <p style={{margin:0,fontSize:11,color:C.textMuted}}>{doc.pasta} · {fmtSize(doc.tamanho)}</p>
            {proj&&<p style={{margin:0,fontSize:11,color:C.accent,fontFamily:"monospace"}}>{proj.code}</p>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <a href={doc.url} target="_blank" style={{background:C.infoBg,color:C.info,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,textDecoration:"none",textAlign:"center"}}>↓</a>
            <button onClick={()=>del(doc)} style={{background:"#2a0a0a",color:C.danger,border:"none",borderRadius:6,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>🗑️</button>
          </div>
        </div>);
      })}
    </div>
    {modal&&<Modal title="Upload de Arquivo" onClose={()=>{setModal(false);setFile(null);}}>
      <Fld label="Projeto"><Sel value={form.project_id} onChange={sf("project_id")} options={projects.map(p=>({value:p.id,label:`${p.code} — ${p.type}`}))}/></Fld>
      <Fld label="Categoria"><Sel value={form.pasta} onChange={sf("pasta")} options={PASTAS}/></Fld>
      <Fld label="Arquivo">
        <div style={{border:`2px dashed ${file?C.success:C.border}`,borderRadius:12,padding:30,textAlign:"center",cursor:"pointer"}} onClick={()=>document.getElementById("fi").click()}>
          <input id="fi" type="file" style={{display:"none"}} onChange={e=>{if(e.target.files[0])setFile(e.target.files[0]);}} accept=".pdf,.dwg,.docx,.xlsx,.jpg,.jpeg,.png,.zip"/>
          {file?<><p style={{fontSize:28,margin:"0 0 8px"}}>✅</p><p style={{fontSize:14,fontWeight:700,color:C.success,margin:0}}>{file.name}</p></>
          :<><p style={{fontSize:36,margin:"0 0 8px"}}>📁</p><p style={{color:C.textMuted,fontSize:14,margin:0}}>Toque para selecionar</p></>}
        </div>
      </Fld>
      <Btn full primary onClick={upload} style={{marginTop:8}}>{uploading?"Enviando...":"Fazer Upload"}</Btn>
    </Modal>}
  </div>);
};

const Laudos = ({laudos,clients,reload}) => {
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [loading,setLoading]=useState(false);
  const TYPES=["Inspecao Predial","Estrutural","Patologia","SPDA","AVCB","NR12","Acessibilidade"];
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!form.client_id)return alert("Cliente obrigatorio!");
    setLoading(true);
    const d={type:form.type,client_id:+form.client_id,address:form.address,responsible:form.responsible,survey_date:form.survey_date||null,delivery_date:form.delivery_date||null,value:+form.value||0,status:form.status||"Em desenvolvimento"};
    if(form.id){await sb.from("laudos").update(d).eq("id",form.id);}else{await sb.from("laudos").insert(d);}
    await reload();setLoading(false);setModal(false);
  };
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:0}}>Laudos</h2>
      <Btn small primary onClick={()=>{setForm({status:"Em desenvolvimento",type:"Inspecao Predial"});setModal(true);}}>+ Novo</Btn>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {laudos.map(l=>{const cl=clients.find(c=>c.id===l.client_id);return(
        <div key={l.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:14,fontWeight:700,color:C.text}}>{l.type}</span><Badge text={l.status}/></div>
          <p style={{margin:"0 0 2px",fontSize:13,color:C.textMuted}}>{cl?.name||"-"}</p>
          <p style={{margin:"0 0 10px",fontSize:12,color:C.textMuted}}>{l.address}</p>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:14,fontWeight:700,color:C.success}}>{fmt(l.value)}</span>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setForm({...l,client_id:String(l.client_id),value:String(l.value)});setModal(true);}} style={{background:"none",border:"none",cursor:"pointer",color:C.info,fontSize:20}}>✏️</button>
              <button onClick={async()=>{if(!confirm("Excluir?"))return;await sb.from("laudos").delete().eq("id",l.id);await reload();}} style={{background:"none",border:"none",cursor:"pointer",color:C.danger,fontSize:20}}>🗑️</button>
            </div>
          </div>
        </div>
      );})}
      {laudos.length===0&&<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum laudo</div>}
    </div>
    {modal&&<Modal title={form.id?"Editar Laudo":"Novo Laudo"} onClose={()=>setModal(false)}>
      <Fld label="Tipo"><Sel value={form.type||""} onChange={sf("type")} options={TYPES}/></Fld>
      <Fld label="Status"><Sel value={form.status||""} onChange={sf("status")} options={["Em desenvolvimento","Revisao","Concluido"]}/></Fld>
      <Fld label="Cliente"><Sel value={form.client_id||""} onChange={sf("client_id")} options={clients.map(c=>({value:c.id,label:c.name}))}/></Fld>
      <Fld label="Endereco"><Inp value={form.address||""} onChange={sf("address")}/></Fld>
      <Fld label="Responsavel"><Inp value={form.responsible||""} onChange={sf("responsible")}/></Fld>
      <Fld label="Valor (R$)"><Inp value={form.value||""} onChange={sf("value")} type="number"/></Fld>
      <Fld label="Data Vistoria"><Inp value={form.survey_date||""} onChange={sf("survey_date")} type="date"/></Fld>
      <Fld label="Prazo Entrega"><Inp value={form.delivery_date||""} onChange={sf("delivery_date")} type="date"/></Fld>
      <Btn full primary onClick={save} style={{marginTop:8}}>{loading?"Salvando...":"Salvar"}</Btn>
    </Modal>}
  </div>);
};

const Financial = ({receivables,payables,clients,projects,reload}) => {
  const [tab,setTab]=useState("rec");
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [loading,setLoading]=useState(false);
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const pRec=receivables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const pPay=payables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const tRec=receivables.filter(r=>r.status==="Recebido").reduce((s,r)=>s+r.value,0);
  const tPay=payables.filter(r=>r.status==="Pago").reduce((s,r)=>s+r.value,0);
  const CATS=["Equipe","Terceiros","Softwares","CREA","Impostos","Combustivel","Marketing","Equipamentos"];
  const saveRec=async()=>{
    if(!form.description||!form.value)return alert("Preencha descricao e valor!");
    setLoading(true);
    const d={client_id:+form.client_id||null,project_id:+form.project_id||null,description:form.description,value:+form.value,due_date:form.due_date||null,status:form.status||"Pendente"};
    if(form.id){await sb.from("financials_receivables").update(d).eq("id",form.id);}else{await sb.from("financials_receivables").insert(d);}
    await reload();setLoading(false);setModal(false);
  };
  const savePay=async()=>{
    if(!form.description||!form.value)return alert("Preencha descricao e valor!");
    setLoading(true);
    const d={category:form.category||"Outros",description:form.description,value:+form.value,due_date:form.due_date||null,status:form.status||"Pendente"};
    if(form.id){await sb.from("financials_payables").update(d).eq("id",form.id);}else{await sb.from("financials_payables").insert(d);}
    await reload();setLoading(false);setModal(false);
  };
  return(<div>
    <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:"0 0 16px"}}>Financeiro</h2>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      <StatCard label="A Receber" value={fmt(pRec).replace("R$","R$")} icon="📥" color={C.success} hl/>
      <StatCard label="A Pagar" value={fmt(pPay)} icon="📤" color={C.danger} hl/>
      <StatCard label="Recebido" value={fmt(tRec)} icon="💚" color={C.success}/>
      <StatCard label="Saldo" value={fmt(tRec-tPay)} icon={tRec>=tPay?"📈":"📉"} color={tRec>=tPay?C.success:C.danger} hl/>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{display:"flex",gap:4,background:C.graphite,borderRadius:10,padding:4}}>
        {[["rec","A Receber"],["pay","A Pagar"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{padding:"10px 16px",borderRadius:8,border:"none",cursor:"pointer",background:tab===k?C.surface:"transparent",color:tab===k?C.text:C.textMuted,fontSize:13,fontWeight:700,minHeight:40}}>{l}</button>
        ))}
      </div>
      <Btn small primary onClick={()=>{setForm({status:"Pendente"});setModal(true);}}>+</Btn>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {tab==="rec"&&receivables.map(r=>{
        const cl=clients.find(c=>c.id===r.client_id);
        return(<div key={r.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <p style={{margin:0,fontSize:14,fontWeight:700,color:C.text,flex:1}}>{r.description}</p>
            <span style={{color:r.status==="Recebido"?C.success:C.warning,fontWeight:700,fontSize:12,marginLeft:8}}>{r.status}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><p style={{margin:0,fontSize:13,color:C.success,fontWeight:800}}>{fmt(r.value)}</p><p style={{margin:0,fontSize:11,color:C.textMuted}}>Vence {fmtD(r.due_date)}</p></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setForm({...r,client_id:String(r.client_id||""),project_id:String(r.project_id||""),value:String(r.value)});setModal(true);}} style={{background:"none",border:"none",cursor:"pointer",color:C.info,fontSize:20}}>✏️</button>
              <button onClick={async()=>{if(!confirm("Excluir?"))return;await sb.from("financials_receivables").delete().eq("id",r.id);await reload();}} style={{background:"none",border:"none",cursor:"pointer",color:C.danger,fontSize:20}}>🗑️</button>
            </div>
          </div>
        </div>);
      })}
      {tab==="pay"&&payables.map(p=>(
        <div key={p.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <p style={{margin:0,fontSize:14,fontWeight:700,color:C.text,flex:1}}>{p.description}</p>
            <span style={{color:p.status==="Pago"?C.success:C.warning,fontWeight:700,fontSize:12,marginLeft:8}}>{p.status}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><p style={{margin:0,fontSize:13,color:C.danger,fontWeight:800}}>{fmt(p.value)}</p><p style={{margin:0,fontSize:11,color:C.textMuted}}>{p.category} · {fmtD(p.due_date)}</p></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setForm({...p,value:String(p.value)});setModal(true);}} style={{background:"none",border:"none",cursor:"pointer",color:C.info,fontSize:20}}>✏️</button>
              <button onClick={async()=>{if(!confirm("Excluir?"))return;await sb.from("financials_payables").delete().eq("id",p.id);await reload();}} style={{background:"none",border:"none",cursor:"pointer",color:C.danger,fontSize:20}}>🗑️</button>
            </div>
          </div>
        </div>
      ))}
      {((tab==="rec"&&receivables.length===0)||(tab==="pay"&&payables.length===0))&&<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum registro</div>}
    </div>
    {modal&&tab==="rec"&&<Modal title="Novo Recebimento" onClose={()=>setModal(false)}>
      <Fld label="Descricao"><Inp value={form.description||""} onChange={sf("description")} placeholder="Ex: Parcela 1/3"/></Fld>
      <Fld label="Cliente"><Sel value={form.client_id||""} onChange={sf("client_id")} options={clients.map(c=>({value:c.id,label:c.name}))}/></Fld>
      <Fld label="Projeto"><Sel value={form.project_id||""} onChange={sf("project_id")} options={projects.map(p=>({value:p.id,label:p.code}))}/></Fld>
      <Fld label="Valor (R$)"><Inp value={form.value||""} onChange={sf("value")} type="number"/></Fld>
      <Fld label="Vencimento"><Inp value={form.due_date||""} onChange={sf("due_date")} type="date"/></Fld>
      <Fld label="Status"><Sel value={form.status||""} onChange={sf("status")} options={["Pendente","Recebido","Cancelado"]}/></Fld>
      <Btn full primary onClick={saveRec} style={{marginTop:8}}>{loading?"Salvando...":"Salvar"}</Btn>
    </Modal>}
    {modal&&tab==="pay"&&<Modal title="Novo Pagamento" onClose={()=>setModal(false)}>
      <Fld label="Categoria"><Sel value={form.category||""} onChange={sf("category")} options={CATS}/></Fld>
      <Fld label="Descricao"><Inp value={form.description||""} onChange={sf("description")}/></Fld>
      <Fld label="Valor (R$)"><Inp value={form.value||""} onChange={sf("value")} type="number"/></Fld>
      <Fld label="Vencimento"><Inp value={form.due_date||""} onChange={sf("due_date")} type="date"/></Fld>
      <Fld label="Status"><Sel value={form.status||""} onChange={sf("status")} options={["Pendente","Pago","Cancelado"]}/></Fld>
      <Btn full primary onClick={savePay} style={{marginTop:8}}>{loading?"Salvando...":"Salvar"}</Btn>
    </Modal>}
  </div>);
};

const NAV=[{k:"dashboard",l:"Início",ic:"📊"},{k:"clients",l:"Clientes",ic:"👥"},{k:"projects",l:"Projetos",ic:"📐"},{k:"documentos",l:"Docs",ic:"📁"},{k:"laudos",l:"Laudos",ic:"📋"},{k:"financial",l:"Financeiro",ic:"💰"}];

function App(){
  const [page,setPage]=useState("dashboard");
  const [loading,setLoading]=useState(true);
  const [clients,setClients]=useState([]);
  const [projects,setProjects]=useState([]);
  const [laudos,setLaudos]=useState([]);
  const [obras,setObras]=useState([]);
  const [receivables,setReceivables]=useState([]);
  const [payables,setPayables]=useState([]);
  const loadAll=async()=>{
    setLoading(true);
    const [c,p,l,o,r,py]=await Promise.all([
      sb.from("clients").select("*").order("created_at",{ascending:false}),
      sb.from("projects").select("*").order("created_at",{ascending:false}),
      sb.from("laudos").select("*").order("created_at",{ascending:false}),
      sb.from("obras").select("*").order("created_at",{ascending:false}),
      sb.from("financials_receivables").select("*").order("created_at",{ascending:false}),
      sb.from("financials_payables").select("*").order("created_at",{ascending:false}),
    ]);
    setClients(c.data||[]);setProjects(p.data||[]);setLaudos(l.data||[]);
    setObras(o.data||[]);setReceivables(r.data||[]);setPayables(py.data||[]);
    setLoading(false);
  };
  useEffect(()=>{loadAll();},[]);

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:C.bg}}>
      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:100,paddingTop:"calc(12px + env(safe-area-inset-top, 0px))"}}>
        <div style={{width:32,height:32,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#000"}}>PL</div>
        <div><p style={{margin:0,fontSize:14,fontWeight:900,color:C.text}}>PLSilva Engenharia</p></div>
        <button onClick={loadAll} style={{marginLeft:"auto",background:"none",border:"none",color:C.textMuted,fontSize:20,cursor:"pointer",padding:4}}>↺</button>
      </div>

      {/* Content */}
      <div style={{flex:1,padding:16,paddingBottom:80,overflowY:"auto"}}>
        {loading?<Loading/>:<>
          {page==="dashboard"&&<Dashboard clients={clients} projects={projects} laudos={laudos} receivables={receivables} payables={payables}/>}
          {page==="clients"&&<Clients clients={clients} projects={projects} laudos={laudos} receivables={receivables} reload={loadAll}/>}
          {page==="projects"&&<Projects projects={projects} clients={clients} receivables={receivables} reload={loadAll}/>}
          {page==="documentos"&&<Documentos projects={projects}/>}
          {page==="laudos"&&<Laudos laudos={laudos} clients={clients} reload={loadAll}/>}
          {page==="financial"&&<Financial receivables={receivables} payables={payables} clients={clients} projects={projects} reload={loadAll}/>}
        </>}
      </div>

      {/* Bottom Navigation */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom, 0px)",zIndex:100}}>
        {NAV.map(item=>{const active=page===item.k;return(
          <button key={item.k} onClick={()=>setPage(item.k)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"10px 4px",border:"none",cursor:"pointer",background:"transparent",color:active?C.accent:C.textMuted,fontSize:10,fontWeight:active?700:500,gap:3,minHeight:56}}>
            <span style={{fontSize:20}}>{item.ic}</span>
            <span>{item.l}</span>
          </button>
        );})}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
