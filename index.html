const FluxoCaixa = ({receivables, payables}) => {
  const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const anoAtual = new Date().getFullYear();
  const [ano,setAno] = useState(String(anoAtual));

  const anos = useMemo(()=>{
    const s = new Set();
    receivables.forEach(r=>{if(r.due_date)s.add(r.due_date.substring(0,4));});
    payables.forEach(p=>{if(p.due_date)s.add(p.due_date.substring(0,4));});
    return Array.from(s).sort((a,b)=>b-a);
  },[receivables,payables]);

  const dados = useMemo(()=>{
    return meses.map((_,i)=>{
      const m = String(i+1).padStart(2,"0");
      const prefix = ano+"-"+m;
      const entrada = receivables.filter(r=>r.status==="Recebido"&&(r.due_date||"").startsWith(prefix)).reduce((s,r)=>s+r.value,0);
      const saida = payables.filter(p=>p.status==="Pago"&&(p.due_date||"").startsWith(prefix)).reduce((s,p)=>s+p.value,0);
      return {mes:meses[i], entrada, saida, saldo:entrada-saida};
    });
  },[receivables,payables,ano]);

  const maxVal = Math.max(...dados.map(d=>Math.max(d.entrada,d.saida)),1);
  const totalEntrada = dados.reduce((s,d)=>s+d.entrada,0);
  const totalSaida = dados.reduce((s,d)=>s+d.saida,0);

  return(<div>
    <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
      {anos.map(a=>(
        <button key={a} onClick={()=>setAno(a)} style={{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid "+(ano===a?C.accent:C.border),background:ano===a?C.accentDim:"transparent",color:ano===a?C.accentText:C.textMuted,whiteSpace:"nowrap"}}>{a}</button>
      ))}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
      {[
        {l:"Entradas",v:fmt(totalEntrada),c:C.success},
        {l:"Saidas",v:fmt(totalSaida),c:C.danger},
        {l:"Saldo",v:fmt(totalEntrada-totalSaida),c:totalEntrada>=totalSaida?C.success:C.danger},
      ].map(({l,v,c})=>(
        <div key={l} style={{background:C.surface,border:"1px solid "+c+"44",borderRadius:10,padding:12,textAlign:"center",borderTop:"2px solid "+c}}>
          <p style={{margin:"0 0 4px",fontSize:10,color:C.textMuted,fontWeight:700,textTransform:"uppercase"}}>{l}</p>
          <p style={{margin:0,fontSize:13,fontWeight:900,color:c}}>{v}</p>
        </div>
      ))}
    </div>

    {/* Grafico de barras */}
    <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:16}}>
      <h3 style={{margin:"0 0 16px",fontSize:14,fontWeight:800,color:C.text}}>📊 Entradas vs Saídas — {ano}</h3>
      <div style={{display:"flex",alignItems:"flex-end",gap:3,height:120,marginBottom:8}}>
        {dados.map(({mes,entrada,saida})=>{
          const hE = maxVal>0?Math.max(4,Math.round((entrada/maxVal)*110)):4;
          const hS = maxVal>0?Math.max(0,Math.round((saida/maxVal)*110)):0;
          return(<div key={mes} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{width:"100%",display:"flex",gap:1,alignItems:"flex-end",height:110}}>
              <div style={{flex:1,height:hE,background:C.success,borderRadius:"3px 3px 0 0",opacity:0.85}}/>
              <div style={{flex:1,height:hS,background:C.danger,borderRadius:"3px 3px 0 0",opacity:0.85}}/>
            </div>
            <span style={{fontSize:8,color:C.textMuted}}>{mes}</span>
          </div>);
        })}
      </div>
      <div style={{display:"flex",gap:16,justifyContent:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,background:C.success,borderRadius:2}}/><span style={{fontSize:11,color:C.textMuted}}>Entradas</span></div>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,background:C.danger,borderRadius:2}}/><span style={{fontSize:11,color:C.textMuted}}>Saídas</span></div>
      </div>
    </div>

    {/* Tabela mensal */}
    <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16}}>
      <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:800,color:C.text}}>Detalhes Mensais</h3>
      {dados.filter(d=>d.entrada>0||d.saida>0).map(d=>(
        <div key={d.mes} style={{padding:"10px 0",borderBottom:"1px solid "+C.border}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:700,color:C.text}}>{d.mes}</span>
            <span style={{fontSize:13,fontWeight:800,color:d.saldo>=0?C.success:C.danger}}>{fmt(d.saldo)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:11,color:C.success}}>↑ {fmt(d.entrada)}</span>
            <span style={{fontSize:11,color:C.danger}}>↓ {fmt(d.saida)}</span>
          </div>
        </div>
      ))}
      {dados.every(d=>d.entrada===0&&d.saida===0)&&<p style={{color:C.textMuted,fontSize:13,textAlign:"center",padding:20}}>Nenhum dado em {ano}</p>}
    </div>
  </div>);
};

    receivables.filter(r=>r.status==="Recebido"&&r.due_date).forEach(r=>{
      const ano=r.due_date.substring(0,4);
      if(!map[ano])map[ano]={total:0,qtd:0};
      map[ano].total+=r.value;map[ano].qtd++;
    });
    return Object.entries(map).sort((a,b)=>b[0]-a[0]);
  },[receivables]);
  const anos=["Todos",...recPorAno.map(([a])=>a)];
  const maxVal=recPorAno.length?Math.max(...recPorAno.map(([,v])=>v.total)):1;
  const totalGeral=recPorAno.reduce((s,[,v])=>s+v.total,0);
  const recPorMes=useMemo(()=>{
    if(anoFiltro==="Todos")return[];

    const map=Array(12).fill(0);
    receivables.filter(r=>r.status==="Recebido"&&r.due_date&&r.due_date.startsWith(anoFiltro)).forEach(r=>{
      const mes=parseInt(r.due_date.substring(5,7))-1;
      map[mes]+=r.value;
    });
    return map.map((v,i)=>({mes:MESES[i],val:v}));
  },[receivables,anoFiltro]);
  const maxMes=recPorMes.length?Math.max(...recPorMes.map(r=>r.val),1):1;
  const fatPorTipo=useMemo(()=>{
    const map={};

      if(!p.type)return;
      if(!map[p.type])map[p.type]={qtd:0,valor:0,concluidos:0};

      if(p.status==="Concluido")map[p.type].concluidos++;
    });
    return Object.entries(map).sort((a,b)=>b[1].valor-a[1].valor);
  },[projects]);
  const maxTipo=fatPorTipo.length?Math.max(...fatPorTipo.map(([,v])=>v.valor),1):1;

    {(()=>{

      const prefixMes = anoAtual+"-"+mesAtual;
      const totalAno = receivables.filter(r=>r.status==="Recebido"&&(r.due_date||"").startsWith(anoAtual)).reduce((s,r)=>s+r.value,0);
      const totalMes = receivables.filter(r=>r.status==="Recebido"&&(r.due_date||"").startsWith(prefixMes)).reduce((s,r)=>s+r.value,0);

      return(<>

          <span style={{fontSize:14,fontWeight:800,color:C.accentText}}>{fmt(totalGeral)}</span>
        </div>

        {/* Acumulado do Ano - medio */}
        <div style={{background:"linear-gradient(135deg,#0a1a2a,#0d2035)",border:"1px solid "+C.info+"44",borderRadius:12,padding:16,marginBottom:10,borderLeft:"3px solid "+C.info}}>
          <p style={{margin:"0 0 4px",fontSize:11,color:C.info,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Acumulado {anoAtual}</p>
          <p style={{margin:0,fontSize:24,fontWeight:900,color:C.text}}>{fmt(totalAno)}</p>
          <p style={{margin:"3px 0 0",fontSize:11,color:C.textMuted}}>
            {totalGeral>0?(((totalAno/totalGeral)*100).toFixed(1)+"% do histórico"):""}
          </p>
        </div>

        {/* Acumulado do Mes - grande destaque */}
        <div style={{background:"linear-gradient(135deg,"+C.accentDim+",#1a1200)",border:"1px solid "+C.accent+"66",borderRadius:14,padding:20,marginBottom:16,borderLeft:"4px solid "+C.accent}}>
          <p style={{margin:"0 0 6px",fontSize:12,color:C.accentText,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Faturamento — {nomeMes.charAt(0).toUpperCase()+nomeMes.slice(1)}</p>
          <p style={{margin:0,fontSize:32,fontWeight:900,color:C.accent}}>{fmt(totalMes)}</p>
          <p style={{margin:"4px 0 0",fontSize:12,color:C.textMuted}}>
            {totalAno>0?(((totalMes/totalAno)*100).toFixed(1)+"% do acumulado do ano"):""}
          </p>
        </div>
      </>);
    })()}
    <div style={{display:"flex",gap:4,background:C.graphite,borderRadius:10,padding:4,marginBottom:16}}>
      {[["anos","Por Ano"],["tipos","Por Tipo"],["fluxo","Fluxo de Caixa"]].map(([k,l])=>(
        <button key={k} onClick={()=>setAbaRel(k)} style={{flex:1,padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:abaRel===k?C.surface:"transparent",color:abaRel===k?C.text:C.textMuted,fontSize:12,fontWeight:700,minHeight:40}}>{l}</button>
      ))}
    </div>
    {abaRel==="anos"&&<>
      <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
        {anos.map(a=>(
          <button key={a} onClick={()=>setAnoFiltro(a)} style={{padding:"8px 16px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:`1px solid ${anoFiltro===a?C.accent:C.border}`,background:anoFiltro===a?C.accentDim:"transparent",color:anoFiltro===a?C.accentText:C.textMuted,whiteSpace:"nowrap",minHeight:36}}>{a}</button>
        ))}
      </div>
      {anoFiltro!=="Todos"&&recPorMes.length>0&&(
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:16}}>
          <h3 style={{margin:"0 0 16px",fontSize:14,fontWeight:800,color:C.text}}>📅 Mês a Mês — {anoFiltro}</h3>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:100}}>
            {recPorMes.map(({mes,val})=>{
              const pct=maxMes>0?Math.max(4,Math.round((val/maxMes)*100)):4;
              return(<div key={mes} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{width:"100%",height:`${pct}%`,background:val>0?C.accent:C.border,borderRadius:"4px 4px 0 0",minHeight:4}}/>
                <span style={{fontSize:9,color:C.textMuted}}>{mes}</span>
              </div>);
            })}
          </div>
          <div style={{marginTop:10,textAlign:"center"}}>
            <span style={{fontSize:14,color:C.accentText,fontWeight:800}}>{fmt(recPorMes.reduce((s,r)=>s+r.val,0))}</span>
            <span style={{fontSize:11,color:C.textMuted}}> total em {anoFiltro}</span>
          </div>
        </div>
      )}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
        <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>📊 Receita por Ano</h3>
        {(anoFiltro==="Todos"?recPorAno:recPorAno.filter(([a])=>a===anoFiltro)).map(([ano,dados])=>(
          <div key={ano} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div><span style={{fontSize:15,fontWeight:800,color:C.text}}>{ano}</span><span style={{fontSize:11,color:C.textMuted,marginLeft:8}}>{dados.qtd} recebimentos</span></div>
              <span style={{fontSize:14,fontWeight:900,color:C.accentText}}>{fmt(dados.total)}</span>
            </div>
            <PBar value={dados.total} max={maxVal} color={C.accent}/>
          </div>
        ))}
      </div>
    </>}
    {abaRel==="tipos"&&<>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:16}}>
        <h3 style={{margin:"0 0 4px",fontSize:14,fontWeight:800,color:C.text}}>🏗️ Faturamento por Tipo</h3>
        <p style={{margin:"0 0 14px",fontSize:11,color:C.textMuted}}>Total: {fmt(totalTipos)}</p>
        {fatPorTipo.map(([tipo,dados])=>{
          const cor=TIPO_COR_PROJ[tipo]||C.accent;
          const pct=totalTipos>0?((dados.valor/totalTipos)*100).toFixed(1):0;
          return(<div key={tipo} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                  <div style={{width:10,height:10,borderRadius:3,background:cor,flexShrink:0}}/>
                  <span style={{fontSize:13,color:C.text,fontWeight:700}}>{tipo}</span>
                </div>
                <span style={{fontSize:11,color:C.textMuted,marginLeft:16}}>{dados.qtd} proj. · {dados.concluidos} concluídos</span>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:13,fontWeight:900,color:cor}}>{fmt(dados.valor)}</div>
                <div style={{fontSize:11,color:C.textMuted}}>{pct}%</div>
              </div>
            </div>
            <PBar value={dados.valor} max={maxTipo} color={cor}/>
          </div>);
        })}
      </div>
    </>}
  </div>);
};

const ClienteBusca = ({value, onChange}) => {
  const [query, setQuery] = useState("");
  const [results, setResults] = useState([]);
  const [selected, setSelected] = useState(null);
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    if(value && !selected){
      sb.from("clients").select("id,name").eq("id",value).single().then(({data})=>{
        if(data) setSelected(data);
      });
    }
  },[value]);

  useEffect(()=>{
    if(!query||query.length<2){setResults([]);return;}
    const timer=setTimeout(async()=>{
      const {data}=await sb.from("clients").select("id,name")
        .ilike("name","%"+query+"%").limit(20);
      setResults(data||[]);
    },300);
    return()=>clearTimeout(timer);
  },[query]);

  return(<div style={{position:"relative"}}>
    {selected?
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"12px 14px",background:C.bg,border:"1px solid "+C.accent,borderRadius:10,minHeight:48}}>
        <span style={{flex:1,fontSize:15,color:C.text}}>{selected.name}</span>
        <button onClick={()=>{setSelected(null);setQuery("");onChange("");}} style={{background:"none",border:"none",color:C.danger,fontSize:18,cursor:"pointer"}}>×</button>
      </div>
    :
      <div>
        <input value={query} onChange={e=>setQuery(e.target.value)}
          onFocus={()=>setOpen(true)}
          placeholder="Digite o nome do cliente..."
          style={{width:"100%",padding:"14px",background:C.bg,border:"1px solid "+C.border,borderRadius:10,color:C.text,fontSize:16,outline:"none",boxSizing:"border-box",minHeight:48}}
          onBlur={()=>setTimeout(()=>setOpen(false),200)}
        />
        {open&&results.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:C.surface,border:"1px solid "+C.accent,borderRadius:10,zIndex:500,maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
          {results.map(c=>(
            <div key={c.id} onClick={()=>{setSelected(c);onChange(String(c.id));setQuery("");setOpen(false);}}
              style={{padding:"12px 16px",cursor:"pointer",borderBottom:"1px solid "+C.border,fontSize:14,color:C.text}}
              onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHover}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              {c.name}
            </div>
          ))}
        </div>}
      </div>
    }
  </div>);
};

const Clients = ({clients,projects,laudos,receivables,reload}) => {
  const [search,setSearch]=useState("");

  const [dbResults, setDbResults]=useState([]);
  const [searching, setSearching]=useState(false);

  useEffect(()=>{
    if(!search||search.length<2){setDbResults([]);return;}
    setSearching(true);
    const timer=setTimeout(async()=>{
      const {data}=await sb.from("clients").select("*")
        .or("name.ilike.%"+search+"%,doc.ilike.%"+search+"%")
        .limit(100);
      setDbResults(data||[]);
      setSearching(false);
    },400);
    return()=>clearTimeout(timer);
  },[search]);

  const list = search && search.length>=2 ? dbResults : clients.slice(0,50);
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!form.name)return alert("Nome obrigatorio!");
    setLoading(true);
    const d={name:form.name,type:form.type||"PF",doc:form.doc,phone:form.phone,email:form.email,city:form.city,state:form.state||"MG",address:form.address};
    if(form.id){await sb.from("clients").update(d).eq("id",form.id);}else{await sb.from("clients").insert(d);}
    await reload();setLoading(false);setModal(false);setSel(null);
  };
  const del=async(id)=>{if(!confirm("Excluir?"))return;await sb.from("clients").delete().eq("id",id);await reload();setSel(null);};

    for(const dup of mergeSel){
      await sb.from("financials_receivables").update({client_id:mergeMain.id}).eq("client_id",dup.id);
      await sb.from("projects").update({client_id:mergeMain.id}).eq("client_id",dup.id);
      await sb.from("laudos").update({client_id:mergeMain.id}).eq("client_id",dup.id);

const Documentos = ({projects}) => {
  const [docs,setDocs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [uploading,setUploading]=useState(false);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({project_id:"",pasta:"Contrato"});
  const [file,setFile]=useState(null);
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const loadDocs=async()=>{setLoading(true);const{data}=await sb.from("documentos").select("*").order("created_at",{ascending:false});setDocs(data||[]);setLoading(false);};
  useEffect(()=>{loadDocs();},[]);
  const upload=async()=>{
    if(!file||!form.project_id)return alert("Selecione projeto e arquivo!");
    setUploading(true);
    const ext=file.name.split(".").pop().toLowerCase();
    const path=`${form.project_id}/${form.pasta}/${Date.now()}_${file.name}`;
    const{error}=await sb.storage.from("documentos").upload(path,file);
    if(error){alert("Erro: "+error.message);setUploading(false);return;}
    const{data:u}=sb.storage.from("documentos").getPublicUrl(path);
    await sb.from("documentos").insert({project_id:+form.project_id,pasta:form.pasta,nome:file.name,tipo:ext,tamanho:file.size,url:u.publicUrl,path});
    await loadDocs();setUploading(false);setModal(false);setFile(null);setForm({project_id:"",pasta:"Contrato"});
  };
  const del=async(doc)=>{if(!confirm("Excluir?"))return;await sb.storage.from("documentos").remove([doc.path]);await sb.from("documentos").delete().eq("id",doc.id);await loadDocs();};
  const fmtSize=b=>{if(!b)return"-";if(b>1024*1024)return`${(b/1024/1024).toFixed(1)} MB`;return`${(b/1024).toFixed(0)} KB`;};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:0}}>Documentos</h2>
      <Btn small primary onClick={()=>setModal(true)}>+ Upload</Btn>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {loading?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Carregando...</div>:
      docs.length===0?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum documento</div>:
      docs.map(doc=>{
        const ext=doc.tipo||"pdf";const proj=projects.find(p=>p.id===doc.project_id);
        return(<div key={doc.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:44,height:44,borderRadius:10,background:(TIPO_COR[ext]||"#888")+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{TIPO_ICON[ext]||"📄"}</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.nome}</p>
            <p style={{margin:0,fontSize:11,color:C.textMuted}}>{doc.pasta} · {fmtSize(doc.tamanho)}</p>
            {proj&&<p style={{margin:0,fontSize:11,color:C.accent,fontFamily:"monospace"}}>{proj.code}</p>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <a href={doc.url} target="_blank" style={{background:C.infoBg,color:C.info,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,textDecoration:"none",textAlign:"center"}}>↓</a>
            <button onClick={()=>del(doc)} style={{background:"#2a0a0a",color:C.danger,border:"none",borderRadius:6,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>🗑️</button>
          </div>
        </div>);
      })}
    </div>
    {modal&&<Modal title="Upload de Arquivo" onClose={()=>{setModal(false);setFile(null);}}>
      <Fld label="Projeto"><Sel value={form.project_id} onChange={sf("project_id")} options={projects.map(p=>({value:p.id,label:`${p.code} — ${p.type}`}))}/></Fld>
      <Fld label="Categoria"><Sel value={form.pasta} onChange={sf("pasta")} options={PASTAS}/></Fld>
      <Fld label="Arquivo">
        <div style={{border:`2px dashed ${file?C.success:C.border}`,borderRadius:12,padding:30,textAlign:"center",cursor:"pointer"}} onClick={()=>document.getElementById("fi").click()}>
          <input id="fi" type="file" style={{display:"none"}} onChange={e=>{if(e.target.files[0])setFile(e.target.files[0]);}} accept=".pdf,.dwg,.docx,.xlsx,.jpg,.jpeg,.png,.zip"/>
          {file?<><p style={{fontSize:28,margin:"0 0 8px"}}>✅</p><p style={{fontSize:14,fontWeight:700,color:C.success,margin:0}}>{file.name}</p></>
          :<><p style={{fontSize:36,margin:"0 0 8px"}}>📁</p><p style={{color:C.textMuted,fontSize:14,margin:0}}>Toque para selecionar</p></>}
        </div>
      </Fld>
      <Btn full primary onClick={upload} style={{marginTop:8}}>{uploading?"Enviando...":"Fazer Upload"}</Btn>
    </Modal>}
  </div>);
};

const Financial = ({receivables,payables,clients,projects,reload}) => {
  const [tab,setTab]=useState("rec");
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [loading,setLoading]=useState(false);
  const [anoFil,setAnoFil]=useState("");
  const [busca,setBusca]=useState("");
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const [senhaOk,setSenhaOk]=useState(false);
  const [senhaInput,setSenhaInput]=useState("");
  const [senhaErro,setSenhaErro]=useState(false);
  const pRec=receivables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const pPay=payables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const tRec=receivables.filter(r=>r.status==="Recebido").reduce((s,r)=>s+r.value,0);
  const tPay=payables.filter(r=>r.status==="Pago").reduce((s,r)=>s+r.value,0);
  const fmtSec=v=>senhaOk?fmt(v):"R$ ••••••";
  const verificarSenha=()=>{
    if(senhaInput==="Anto1911"){setSenhaOk(true);setSenhaErro(false);}
    else{setSenhaErro(true);setSenhaInput("");}
  };
  const anos=useMemo(()=>{
    const s=new Set();
    receivables.forEach(r=>{if(r.due_date)s.add(r.due_date.substring(0,4));});
    return Array.from(s).sort((a,b)=>b-a);
  },[receivables]);
  const recFiltrado=useMemo(()=>{
    return receivables.filter(r=>{
      if(anoFil&&(!r.due_date||!r.due_date.startsWith(anoFil)))return false;
      if(busca){
        const b=busca.toLowerCase();
        const desc=(r.description||"").toLowerCase();
        const cl=clients.find(c=>c.id===r.client_id);
        const nome=(cl?.name||"").toLowerCase();
        if(!desc.includes(b)&&!nome.includes(b))return false;
      }
      return true;
    });
  },[receivables,anoFil,busca,clients]);
  const CATS=["Equipe","Terceiros","Softwares","CREA","Impostos","Combustivel","Marketing","Equipamentos"];
  const saveRec=async()=>{
    if(!form.description||!form.value)return alert("Preencha descricao e valor!");
    setLoading(true);

    if(form.id){await sb.from("financials_receivables").update(d).eq("id",form.id);}else{await sb.from("financials_receivables").insert(d);}
    await reload();setLoading(false);setModal(false);
  };

    await reload();setLoading(false);setModal(false);
  };

      {[{l:"A Receber",v:fmtSec(pRec),ic:"📥",c:C.success,hl:true},{l:"A Pagar",v:fmtSec(pPay),ic:"📤",c:C.danger,hl:true},
        {l:"Recebido",v:fmtSec(tRec),ic:"💚",c:C.success},{l:"Saldo",v:fmtSec(tRec-tPay),ic:tRec>=tPay?"📈":"📉",c:tRec>=tPay?C.success:C.danger,hl:true}
      ].map(({l,v,ic,c,hl})=>(
        <div key={l} style={{background:C.surface,border:`1px solid ${hl?c+"44":C.border}`,borderRadius:12,padding:14,borderTop:hl?`2px solid ${c}`:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:10,color:C.textMuted,fontWeight:700,textTransform:"uppercase"}}>{l}</span><span>{ic}</span></div>
          <div style={{fontSize:15,fontWeight:900,color:C.text}}>{v}</div>
        </div>
      ))}
    </div>
    {/* Filtros */}
    <div style={{marginBottom:12}}>
      <div style={{marginBottom:8}}>
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar por cliente ou descricao..."
          style={{width:"100%",padding:"12px 14px",background:C.bg,border:"1px solid "+C.border,borderRadius:10,color:C.text,fontSize:16,outline:"none",boxSizing:"border-box"}}
          onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>

        {anos.map(a=>(
          <button key={a} onClick={()=>setAnoFil(a)} style={{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid "+(anoFil===a?C.accent:C.border),background:anoFil===a?C.accentDim:"transparent",color:anoFil===a?C.accentText:C.textMuted,whiteSpace:"nowrap"}}>{a}</button>
        ))}
      </div>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{display:"flex",gap:4,background:C.graphite,borderRadius:10,padding:4}}>

      <Btn small primary onClick={()=>{setForm({status:"Pendente"});setModal(true);}}>+</Btn>

  };


  const stepLabel=["Cliente","Servicos","Valores","Gerar"];
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:0}}>Orcamentos</h2>
      {step>1&&<button onClick={()=>setStep(step-1)} style={{background:"none",border:"none",color:C.accent,fontSize:14,cursor:"pointer"}}>Voltar</button>}
    </div>
    <div style={{display:"flex",gap:6,marginBottom:20}}>
      {stepLabel.map((s,i)=>(
        <div key={i} style={{flex:1,padding:"8px 4px",borderRadius:8,textAlign:"center",background:step===i+1?C.accentDim:step>i+1?"#0a2e1a":C.surface,border:"1px solid "+(step===i+1?C.accent:step>i+1?C.success:C.border)}}>
          <span style={{fontSize:10,fontWeight:700,color:step===i+1?C.accentText:step>i+1?C.success:C.textMuted}}>{step>i+1?"✓ ":""}{s}</span>
        </div>
      ))}
    </div>

    {step===1&&<div>
      <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:14}}>
        <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>Dados da Proposta</h3>
        <Fld label="Numero"><Inp value={num} onChange={setNum} placeholder="Ex: 43R1"/></Fld>
        <Fld label="Data"><Inp value={data} onChange={setData} placeholder="01 de junho de 2026"/></Fld>
        <Fld label="Referência (Ref.:)">
          <textarea value={refTexto} onChange={e=>setRefTexto(e.target.value)} rows={2}
            style={{width:"100%",padding:"12px",background:C.bg,border:"1px solid "+C.border,borderRadius:10,color:C.text,fontSize:15,outline:"none",resize:"none",boxSizing:"border-box"}}/>
        </Fld>
      </div>
      <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:14}}>
        <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>Cliente</h3>
        <Fld label="Selecionar cadastrado">
          <ClienteBusca value={clienteId} onChange={v=>{
            setClienteId(v);
            sb.from("clients").select("id,name,city,state").eq("id",+v).single().then(({data})=>{
              if(data){setClienteNome(data.name);setClienteEnd((data.city||"")+"/"+(data.state||""));}
            });
          }}/>
        </Fld>
        <Fld label="Nome do Cliente"><Inp value={clienteNome} onChange={setClienteNome} placeholder="Nome ou razao social"/></Fld>
        <Fld label="Endereco"><Inp value={clienteEnd} onChange={setClienteEnd} placeholder="Bairro - Cidade UF"/></Fld>
      </div>
      <Btn full primary onClick={()=>{if(!clienteNome)return alert("Preencha o cliente!");setStep(2);}}>Proximo</Btn>
    </div>}

    {step===2&&<div>
      <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:14}}>
        <h3 style={{margin:"0 0 4px",fontSize:14,fontWeight:800,color:C.text}}>Servicos</h3>
        <p style={{margin:"0 0 14px",fontSize:12,color:C.textMuted}}>Marque os servicos do orcamento</p>
        {servicos.map((s,i)=>(
          <div key={s.id} style={{marginBottom:14,paddingBottom:14,borderBottom:"1px solid "+C.border}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:s.ativo?10:0}}>
              <div onClick={()=>toggleS(i)} style={{width:26,height:26,borderRadius:6,border:"2px solid "+(s.ativo?C.accent:C.border),background:s.ativo?C.accentDim:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                {s.ativo&&<span style={{color:C.accent,fontSize:16,fontWeight:900,lineHeight:1}}>✓</span>}
              </div>
              <span style={{fontSize:15,fontWeight:s.ativo?700:400,color:s.ativo?C.text:C.textMuted,cursor:"pointer"}} onClick={()=>toggleS(i)}>{s.nome}</span>
            </div>
            {s.ativo&&<div style={{marginLeft:38}}>
              <textarea value={s.obs} onChange={e=>updateObs(i,e.target.value)} rows={2}
                style={{width:"100%",padding:"10px",background:C.bg,border:"1px solid "+C.border,borderRadius:8,color:C.text,fontSize:14,outline:"none",resize:"none",boxSizing:"border-box"}}/>
            </div>}
          </div>
        ))}
      </div>
      <Btn full primary onClick={()=>{if(ativos.length===0)return alert("Selecione pelo menos 1 servico!");setStep(3);}}>Proximo</Btn>
    </div>}

    {step===3&&<div>
      <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:14}}>
        <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>Honorarios</h3>
        <Fld label="Valor Total (R$)"><Inp value={valorTotal} onChange={setValorTotal} placeholder="Ex: 19.000,00"/></Fld>
        <Fld label="Valor por Extenso"><Inp value={valorExtenso} onChange={setValorExtenso} placeholder="Ex: dezenove mil reais"/></Fld>
      </div>

const PASTAS_DESIGNER = ["Briefing","Planta","Perspectiva","Moodboard","Especificacao","Foto Referencia","Entregavel","Outro"];

const Designer = ({projects}) => {
  const [docs,setDocs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [uploading,setUploading]=useState(false);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({project_id:"",pasta:"Briefing",cliente:""});
  const [file,setFile]=useState(null);
  const [filtPasta,setFiltPasta]=useState("");
  const [busca,setBusca]=useState("");
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));

  const loadDocs=async()=>{
    setLoading(true);
    const{data}=await sb.from("designer_docs").select("*").order("created_at",{ascending:false});
    setDocs(data||[]);
    setLoading(false);
  };
  useEffect(()=>{loadDocs();},[]);

  const upload=async()=>{
    if(!file||!form.cliente)return alert("Preencha o cliente e selecione um arquivo!");
    setUploading(true);
    const ext=file.name.split(".").pop().toLowerCase();
    const path="designer/"+form.cliente.replace(/[^a-zA-Z0-9]/g,"_")+"/"+form.pasta+"/"+Date.now()+"_"+file.name;
    const{error}=await sb.storage.from("documentos").upload(path,file);
    if(error){alert("Erro: "+error.message);setUploading(false);return;}
    const{data:u}=sb.storage.from("documentos").getPublicUrl(path);
    await sb.from("designer_docs").insert({
      cliente:form.cliente,pasta:form.pasta,nome:file.name,
      tipo:ext,tamanho:file.size,url:u.publicUrl,path
    });
    await loadDocs();setUploading(false);setModal(false);setFile(null);
    setForm({project_id:"",pasta:"Briefing",cliente:""});
  };

  const del=async(doc)=>{
    if(!confirm("Excluir?"))return;
    await sb.storage.from("documentos").remove([doc.path]);
    await sb.from("designer_docs").delete().eq("id",doc.id);
    await loadDocs();
  };

  const fmtSize=b=>{if(!b)return"-";if(b>1024*1024)return(b/1024/1024).toFixed(1)+" MB";return(b/1024).toFixed(0)+" KB";};
  const TIPO_IC={pdf:"📄",dwg:"📐",docx:"📝",xlsx:"📊",jpg:"🖼️",jpeg:"🖼️",png:"🖼️",zip:"📦",mp4:"🎬",psd:"🎨",ai:"🎨"};

  const filtered=docs.filter(d=>{
    if(filtPasta&&d.pasta!==filtPasta)return false;
    if(busca&&!(d.cliente||"").toLowerCase().includes(busca.toLowerCase())&&!(d.nome||"").toLowerCase().includes(busca.toLowerCase()))return false;
    return true;
  });

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div>
        <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:"0 0 2px"}}>Designer de Interiores</h2>
        <p style={{fontSize:12,color:C.textMuted,margin:0}}>Briefings, plantas, perspectivas e entregaveis</p>
      </div>
      <Btn small primary onClick={()=>setModal(true)}>+ Upload</Btn>
    </div>

    <div style={{marginBottom:12}}>
      <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar por cliente ou arquivo..."
        style={{width:"100%",padding:"12px 14px",background:C.bg,border:"1px solid "+C.border,borderRadius:10,color:C.text,fontSize:16,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setFiltPasta("")} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid "+(filtPasta===""?C.accent:C.border),background:filtPasta===""?C.accentDim:"transparent",color:filtPasta===""?C.accentText:C.textMuted,whiteSpace:"nowrap"}}>Todos</button>
        {PASTAS_DESIGNER.map(p=>(
          <button key={p} onClick={()=>setFiltPasta(p)} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid "+(filtPasta===p?C.accent:C.border),background:filtPasta===p?C.accentDim:"transparent",color:filtPasta===p?C.accentText:C.textMuted,whiteSpace:"nowrap"}}>{p}</button>
        ))}
      </div>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {loading?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Carregando...</div>:
      filtered.length===0?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum arquivo encontrado</div>:
      filtered.map(doc=>{
        const ext=doc.tipo||"pdf";
        return(<div key={doc.id} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:14,display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:44,height:44,borderRadius:10,background:C.purple+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{TIPO_IC[ext]||"📄"}</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.nome}</p>
            <p style={{margin:0,fontSize:11,color:C.purple}}>{doc.cliente}</p>
            <p style={{margin:0,fontSize:11,color:C.textMuted}}>{doc.pasta+" · "+fmtSize(doc.tamanho)}</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <a href={doc.url} target="_blank" style={{background:C.infoBg,color:C.info,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,textDecoration:"none",textAlign:"center"}}>↓</a>
            <button onClick={()=>del(doc)} style={{background:"#2a0a0a",color:C.danger,border:"none",borderRadius:6,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>🗑️</button>
          </div>
        </div>);
      })}
    </div>

    {modal&&<Modal title="Upload Designer" onClose={()=>{setModal(false);setFile(null);}}>
      <Fld label="Cliente"><Inp value={form.cliente} onChange={sf("cliente")} placeholder="Nome do cliente"/></Fld>
      <Fld label="Categoria"><Sel value={form.pasta} onChange={sf("pasta")} options={PASTAS_DESIGNER}/></Fld>
      <Fld label="Arquivo">
        <div style={{border:"2px dashed "+(file?C.success:C.border),borderRadius:12,padding:30,textAlign:"center",cursor:"pointer"}} onClick={()=>document.getElementById("fi2").click()}>
          <input id="fi2" type="file" style={{display:"none"}} onChange={e=>{if(e.target.files[0])setFile(e.target.files[0]);}}
            accept=".pdf,.dwg,.docx,.xlsx,.jpg,.jpeg,.png,.zip,.mp4,.psd,.ai"/>
          {file?<><p style={{fontSize:28,margin:"0 0 8px"}}>✅</p><p style={{fontSize:14,fontWeight:700,color:C.success,margin:0}}>{file.name}</p></>
          :<><p style={{fontSize:36,margin:"0 0 8px"}}>🎨</p><p style={{color:C.textMuted,fontSize:14,margin:0}}>Toque para selecionar</p><p style={{color:C.textFaint,fontSize:11,margin:"4px 0 0"}}>PDF, JPG, PNG, DWG, AI, PSD, MP4...</p></>}
        </div>
      </Fld>
      <Btn full primary onClick={upload} style={{marginTop:8}}>{uploading?"Enviando...":"Fazer Upload"}</Btn>
    </Modal>}
  </div>);
};

      addMixedLine([{t:"5.3) ",b:true},{t:"Serao cobradas em separado as modificacoes feitas pela ",b:false},{t:"CONTRATANTE",b:true},{t:" posteriores aos projetos ja aprovados.",b:false}]);

    }catch(e){console.error("Erro:",e);alert("Erro: "+e.message);}

const Contratos = ({clients,projects}) => {
  const [gerador,setGerador]=useState(false);
  const [contratos,setContratos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [busca,setBusca]=useState("");
  const [filtStatus,setFiltStatus]=useState("");
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));

  const load=async()=>{
    setLoading(true);
    const{data}=await sb.from("contratos").select("*").order("created_at",{ascending:false});
    setContratos(data||[]);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const save=async()=>{
    if(!form.client_id||!form.descricao)return alert("Preencha cliente e descricao!");
    const d={client_id:+form.client_id,project_id:+form.project_id||null,descricao:form.descricao,
      valor:+form.valor||0,data_assinatura:form.data_assinatura||null,
      data_vencimento:form.data_vencimento||null,status:form.status||"Pendente",obs:form.obs};
    if(form.id){await sb.from("contratos").update(d).eq("id",form.id);}
    else{await sb.from("contratos").insert(d);}
    await load();setModal(false);
  };

  const del=async(id)=>{if(!confirm("Excluir?"))return;await sb.from("contratos").delete().eq("id",id);await load();};

  const STATUS_COR={"Pendente":C.warning,"Assinado":C.success,"Em andamento":C.info,"Concluido":"#10B981","Cancelado":C.danger};

  const filtered=contratos.filter(c=>{
    if(filtStatus&&c.status!==filtStatus)return false;
    if(busca){
      const cl=clients.find(x=>x.id===c.client_id);
      const b=busca.toLowerCase();
      if(!(cl?.name||"").toLowerCase().includes(b)&&!(c.descricao||"").toLowerCase().includes(b))return false;
    }
    return true;
  });

  return(<div>
    {gerador&&<GeradorContrato clients={clients} onClose={()=>setGerador(false)}/>}
    {!gerador&&<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div>
        <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:"0 0 2px"}}>Contratos</h2>
        <p style={{fontSize:12,color:C.textMuted,margin:0}}>{contratos.length+" contrato(s) cadastrado(s)"}</p>
      </div>
      <div style={{display:"flex",gap:8}}>
        <Btn small onClick={()=>setGerador(true)} style={{background:"#0a2e1a",color:C.success,border:"1px solid "+C.success+"44"}}>📄 Gerar</Btn>
        <Btn small primary onClick={()=>{setForm({status:"Pendente"});setModal(true);}}>+ Registrar</Btn>
      </div>
    </div>

    <div style={{marginBottom:12}}>
      <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar por cliente ou descricao..."
        style={{width:"100%",padding:"12px 14px",background:C.bg,border:"1px solid "+C.border,borderRadius:10,color:C.text,fontSize:16,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
        {["","Pendente","Assinado","Em andamento","Concluido","Cancelado"].map(s=>(
          <button key={s} onClick={()=>setFiltStatus(s)} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid "+(filtStatus===s?C.accent:C.border),background:filtStatus===s?C.accentDim:"transparent",color:filtStatus===s?C.accentText:C.textMuted,whiteSpace:"nowrap"}}>{s||"Todos"}</button>
        ))}
      </div>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {loading?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Carregando...</div>:
      filtered.length===0?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum contrato</div>:
      filtered.map(c=>{
        const cl=clients.find(x=>x.id===c.client_id);
        const pj=projects.find(x=>x.id===c.project_id);
        const cor=STATUS_COR[c.status]||C.textMuted;
        return(<div key={c.id} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,borderLeft:"3px solid "+cor}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div style={{flex:1,paddingRight:8}}>
              <p style={{margin:0,fontSize:15,fontWeight:800,color:C.text}}>{cl?.name||"-"}</p>
              <p style={{margin:"2px 0 0",fontSize:13,color:C.textMuted}}>{c.descricao}</p>
              {pj&&<p style={{margin:"2px 0 0",fontSize:11,color:C.accent,fontFamily:"monospace"}}>{pj.code}</p>}
            </div>
            <span style={{padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:700,color:cor,background:cor+"22",whiteSpace:"nowrap"}}>{c.status}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
            <div>
              <p style={{margin:0,fontSize:14,fontWeight:800,color:C.success}}>{fmt(c.valor)}</p>
              <p style={{margin:0,fontSize:11,color:C.textMuted}}>{"Assinatura: "+fmtD(c.data_assinatura)+" · Venc: "+fmtD(c.data_vencimento)}</p>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setForm({...c,client_id:String(c.client_id),project_id:String(c.project_id||""),valor:String(c.valor)});setModal(true);}} style={{background:"none",border:"none",cursor:"pointer",color:C.info,fontSize:20}}>✏️</button>
              <button onClick={()=>del(c.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.danger,fontSize:20}}>🗑️</button>
            </div>
          </div>
        </div>);
      })}
    </div>

    {modal&&<Modal title={form.id?"Editar Contrato":"Novo Contrato"} onClose={()=>setModal(false)}>
      <Fld label="Cliente"><Sel value={form.client_id||""} onChange={sf("client_id")} options={clients.map(c=>({value:c.id,label:c.name}))}/></Fld>
      <Fld label="Projeto"><Sel value={form.project_id||""} onChange={sf("project_id")} options={projects.map(p=>({value:p.id,label:p.code+" - "+p.type}))}/></Fld>
      <Fld label="Descricao"><Inp value={form.descricao||""} onChange={sf("descricao")} placeholder="Ex: Contrato de prestacao de servicos"/></Fld>
      <Fld label="Valor (R$)"><Inp value={form.valor||""} onChange={sf("valor")} type="number"/></Fld>
      <Fld label="Status"><Sel value={form.status||""} onChange={sf("status")} options={["Pendente","Assinado","Em andamento","Concluido","Cancelado"]}/></Fld>
      <Fld label="Data Assinatura"><Inp value={form.data_assinatura||""} onChange={sf("data_assinatura")} type="date"/></Fld>
      <Fld label="Data Vencimento"><Inp value={form.data_vencimento||""} onChange={sf("data_vencimento")} type="date"/></Fld>
      <Fld label="Observacoes"><textarea value={form.obs||""} onChange={e=>sf("obs")(e.target.value)} rows={3}
        style={{width:"100%",padding:"10px",background:C.bg,border:"1px solid "+C.border,borderRadius:8,color:C.text,fontSize:14,outline:"none",resize:"none",boxSizing:"border-box"}}/></Fld>
      <Btn full primary onClick={save} style={{marginTop:8}}>{form.id?"Salvar":"Criar Contrato"}</Btn>
    </Modal>}
    </>}
  </div>);
};

    setLoading(true);
    const [c,p]=await Promise.all([
      sb.from("clients").select("id,name,type,doc,phone,email,city,state,address").order("name"),
      sb.from("projects").select("*").order("created_at",{ascending:false}),
    ]);
    setClients(c.data||[]);
    setProjects(p.data||[]);
    setLoading(false);
  };

  // Carrega dados por aba sob demanda
  const loadTab=async(tab)=>{
    if(loadedTabs[tab]) return; // ja carregou
    setTabLoading(true);
    if(tab==="financeiro"||tab==="relatorios"){
      const [r,py]=await Promise.all([
        sb.from("financials_receivables").select("*").order("due_date",{ascending:false}),
        sb.from("financials_payables").select("*").order("created_at",{ascending:false}),
      ]);
      setReceivables(r.data||[]);
      setPayables(py.data||[]);
    }
    setLoadedTabs(p=>({...p,[tab]:true}));
    setTabLoading(false);
  };

  const loadAll=async()=>{
    setLoadedTabs({});
    await loadBase();
    // Recarrega aba atual
    const cur=page;
    if(cur==="financeiro"||cur==="relatorios"){
      const [r,py]=await Promise.all([
        sb.from("financials_receivables").select("*").order("due_date",{ascending:false}),
        sb.from("financials_payables").select("*").order("created_at",{ascending:false}),
      ]);
      setReceivables(r.data||[]);setPayables(py.data||[]);
      setLoadedTabs(p=>({...p,[cur]:true}));
    }
  };

  useEffect(()=>{loadBase();},[]);

  // Carrega dados quando muda de aba
  useEffect(()=>{
    if(page==="financeiro"||page==="relatorios"){
      loadTab(page);
    }
  },[page]);
  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:C.bg}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:100,paddingTop:"calc(12px + env(safe-area-inset-top, 0px))"}}>
        <div style={{width:32,height:32,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#000",flexShrink:0}}>PL</div>
        <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:900,color:C.text}}>PLSilva Engenharia</p></div>
        <button onClick={loadAll} style={{background:"none",border:"none",color:C.textMuted,fontSize:20,cursor:"pointer",padding:4}}>↺</button>
      </div>
      <div style={{flex:1,padding:16,paddingBottom:80,overflowY:"auto"}}>
        {tabLoading&&<div style={{position:"fixed",top:0,left:0,right:0,height:3,background:C.accent,zIndex:9999,animation:"progress 1s ease infinite"}}/>}
        {loading?<Loading/>:<>
          {page==="dashboard"&&<Dashboard clients={clients} projects={projects} laudos={laudos} receivables={receivables} payables={payables}/>}
          {page==="clientes"&&<Clients clients={clients} projects={projects} laudos={laudos} receivables={receivables} reload={loadAll}/>}
          {page==="projetos"&&<Projects projects={projects} clients={clients} receivables={receivables} reload={loadAll}/>}
          {page==="documentos"&&<Documentos projects={projects}/>}
          {page==="relatorios"&&<Relatorios receivables={receivables} payables={payables} projects={projects} clients={clients}/>}
          {page==="orcamentos"&&<Orcamentos clients={clients}/>}
          {page==="designer"&&<Designer projects={projects}/>}
          {page==="contratos"&&<Contratos clients={clients} projects={projects}/>}
          {page==="financeiro"&&<Financial receivables={receivables} payables={payables} clients={clients} projects={projects} reload={loadAll}/>}
        </>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",overflowX:"auto",paddingBottom:"env(safe-area-inset-bottom, 0px)",zIndex:100}}>
        {NAV.map(item=>{const active=page===item.k;return(
          <button key={item.k} onClick={()=>setPage(item.k)} style={{flex:"0 0 auto",minWidth:60,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"8px 10px",border:"none",cursor:"pointer",background:"transparent",color:active?C.accent:C.textMuted,fontSize:9,fontWeight:active?700:500,gap:3,minHeight:56,borderTop:active?`2px solid ${C.accent}`:"2px solid transparent"}}>
            <span style={{fontSize:18}}>{item.ic}</span>
            <span style={{whiteSpace:"nowrap"}}>{item.l}</span>
          </button>
        );})}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
