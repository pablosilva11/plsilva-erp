const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyZWF0cnZ2Z3hvb2RkaGtiYWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzUxNjUsImV4cCI6MjA5NjAxMTE2NX0.SOS84j22J7lsIzTaUu-SheVV__d87_YUhhP24puKZvU";

  accent:"#E8A020",accentDim:"#2a1a00",accentText:"#F5C060",
  success:"#22C55E",successBg:"#0a2e1a",warning:"#F59E0B",warningBg:"#2a1a00",
  danger:"#EF4444",info:"#3B82F6",infoBg:"#0a1a3a",graphite:"#161616"

const SC = {
  "Orçamento":{color:"#64748b",bg:"#1e2533"},"Contratado":{color:"#3B82F6",bg:"#0a1a3a"},
  "Em desenvolvimento":{color:"#8B5CF6",bg:"#1a0a3a"},"Revisão":{color:"#F59E0B",bg:"#2a1a00"},
  "Protocolado":{color:"#06B6D4",bg:"#001a2a"},"Em análise":{color:"#F97316",bg:"#2a1000"},

  "DAT emitida":{color:"#06B6D4",bg:"#001a2a"},"Adequação":{color:"#F59E0B",bg:"#2a1a00"},

const fmt = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);
const fmtD = d => d ? new Date(d+"T12:00:00").toLocaleDateString("pt-BR") : "-";
const TODAY = new Date();
const Badge = ({text}) => {
  const cfg=SC[text]||{color:"#888",bg:"#1a1a1a"};
  return <span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:700,color:cfg.color,background:cfg.bg,border:`1px solid ${cfg.color}33`,whiteSpace:"nowrap"}}>{text}</span>;
};
const StatCard = ({label,value,sub,icon,color=C.accent,hl}) => (
  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",display:"flex",flexDirection:"column",gap:6,borderTop:hl?`2px solid ${color}`:`1px solid ${C.border}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:11,color:C.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</span>
      <span style={{fontSize:18}}>{icon}</span>
    </div>
    <div style={{fontSize:22,fontWeight:800,color:C.text}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:C.textMuted}}>{sub}</div>}
  </div>
);
const Btn = ({children,onClick,style={},primary,small,danger}) => (
  <button onClick={onClick} style={{background:primary?C.accent:danger?C.danger:C.border,color:primary?"#000":C.text,border:"none",borderRadius:8,padding:small?"7px 14px":"10px 18px",fontSize:small?12:13,fontWeight:700,cursor:"pointer",...style}}>{children}</button>
);
const Inp = ({value,onChange,placeholder,type="text"}) => (
  <input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%",padding:"10px 14px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:13,outline:"none",boxSizing:"border-box"}}
    onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
);
const Sel = ({value,onChange,options}) => (
  <select value={value||""} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",padding:"10px 14px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:13,outline:"none",cursor:"pointer"}}>
    <option value="">Selecione...</option>
    {options.map(o=><option key={o.value||o} value={o.value!==undefined?o.value:o}>{o.label||o}</option>)}
  </select>
);
const Fld = ({label,children}) => (
  <div style={{marginBottom:14}}>
    <label style={{display:"block",fontSize:11,fontWeight:700,color:C.textMuted,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</label>
    {children}
  </div>
);
const G2 = ({children}) => <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>{children}</div>;
const Modal = ({title,onClose,children}) => (
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,width:"min(640px,96vw)",maxHeight:"88vh",overflowY:"auto",padding:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <h3 style={{margin:0,fontSize:17,fontWeight:800,color:C.text}}>{title}</h3>
        <button onClick={onClose} style={{background:C.border,border:"none",borderRadius:6,color:C.text,width:32,height:32,fontSize:18,cursor:"pointer"}}>x</button>
      </div>
      {children}

);
const Tbl = ({cols,rows}) => (
  <div style={{overflowX:"auto",borderRadius:10,border:`1px solid ${C.border}`}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
      <thead><tr style={{background:C.graphite}}>
        {cols.map((c,i)=><th key={i} style={{padding:"11px 14px",textAlign:"left",color:C.textMuted,fontSize:11,fontWeight:700,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{c}</th>)}
      </tr></thead>
      <tbody>
        {rows.map((row,i)=>(
          <tr key={i} style={{borderBottom:`1px solid ${C.border}`}} onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            {row.map((cell,j)=><td key={j} style={{padding:"12px 14px",color:C.text,verticalAlign:"middle"}}>{cell}</td>)}
          </tr>
        ))}
        {rows.length===0&&<tr><td colSpan={cols.length} style={{padding:32,textAlign:"center",color:C.textMuted}}>Nenhum registro encontrado</td></tr>}
      </tbody>
    </table>
  </div>
);
const PBar = ({value,max,color=C.accent}) => {
  const pct=max>0?Math.min(100,Math.round((value/max)*100)):0;
  return <div style={{background:C.border,borderRadius:4,height:5}}><div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:4}}/></div>;
};
const Loading = () => <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:60,color:C.textMuted,fontSize:14}}>Carregando dados...</div>;

const Dashboard = ({clients,projects,laudos,receivables,payables}) => {
  const pendRec=receivables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const pendPay=payables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const monRec=receivables.filter(r=>r.status==="Recebido").reduce((s,r)=>s+r.value,0);
  const monExp=payables.filter(r=>r.status==="Pago").reduce((s,r)=>s+r.value,0);
  const active=projects.filter(p=>!["Concluido","Orcamento"].includes(p.status));
  return (
    <div>
      <div style={{marginBottom:28}}>
        <h1 style={{fontSize:26,fontWeight:900,color:C.text,margin:"0 0 4px"}}>Dashboard Executivo</h1>
        <p style={{color:C.textMuted,margin:0,fontSize:13}}>{TODAY.toLocaleDateString("pt-BR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:14,marginBottom:28}}>
        <StatCard label="Projetos Ativos" value={active.length} sub="Em execucao" icon="📐" hl/>
        <StatCard label="Clientes" value={clients.length} sub="Cadastrados" icon="👥" color={C.info} hl/>
        <StatCard label="Laudos" value={laudos.filter(l=>l.status!=="Concluido").length} sub="Pendentes" icon="📋" color={C.info}/>
        <StatCard label="Aprovados" value={projects.filter(p=>p.status==="Aprovado").length} sub="Este ano" icon="✅" color={C.success}/>
        <StatCard label="Receita Recebida" value={fmt(monRec)} sub="Recebimentos" icon="💰" color={C.success} hl/>
        <StatCard label="Despesas Pagas" value={fmt(monExp)} sub="Pagamentos" icon="📤" color={C.danger}/>
        <StatCard label="A Receber" value={fmt(pendRec)} sub="Pendente" icon="📥" color={C.accentText} hl/>
        <StatCard label="A Pagar" value={fmt(pendPay)} sub="Pendente" icon="⚠️" color={C.warning}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>Alertas de Vencimento</h3>
          {receivables.filter(r=>r.status==="Pendente").slice(0,3).map((r,i)=>(
            <div key={i} style={{padding:"9px 12px",borderRadius:8,background:C.bg,border:`1px solid ${C.success}33`,borderLeft:`3px solid ${C.success}`,marginBottom:8}}>
              <p style={{margin:"0 0 2px",fontSize:12,color:C.text,fontWeight:600}}>A receber: {fmt(r.value)}</p>
              <p style={{margin:0,fontSize:11,color:C.textMuted}}>Vence {fmtD(r.due_date)}</p>
            </div>
          ))}
          {payables.filter(p=>p.status==="Pendente").slice(0,2).map((p,i)=>(
            <div key={i} style={{padding:"9px 12px",borderRadius:8,background:C.bg,border:`1px solid ${C.warning}33`,borderLeft:`3px solid ${C.warning}`,marginBottom:8}}>
              <p style={{margin:"0 0 2px",fontSize:12,color:C.text,fontWeight:600}}>{p.description}: {fmt(p.value)}</p>
              <p style={{margin:0,fontSize:11,color:C.textMuted}}>Vence {fmtD(p.due_date)}</p>
            </div>
          ))}
          {receivables.filter(r=>r.status==="Pendente").length===0&&<p style={{color:C.textMuted,fontSize:13}}>Nenhum vencimento pendente</p>}
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>Projetos Recentes</h3>
          {projects.slice(0,5).map(p=>(
            <div key={p.id} style={{padding:"9px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{p.code}</p><p style={{margin:0,fontSize:11,color:C.textMuted}}>{p.type}</p></div>

const Clients = ({clients,projects,laudos,receivables,reload}) => {
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(false);
  const [sel,setSel]=useState(null);
  const [form,setForm]=useState({});
  const [loading,setLoading]=useState(false);
  const list=clients.filter(c=>c.name?.toLowerCase().includes(search.toLowerCase())||c.doc?.includes(search));
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!form.name)return alert("Nome obrigatorio!");
    setLoading(true);
    const d={name:form.name,type:form.type||"PF",doc:form.doc,phone:form.phone,email:form.email,city:form.city,state:form.state||"MG",address:form.address,obs:form.obs};
    if(form.id){await sb.from("clients").update(d).eq("id",form.id);}
    else{await sb.from("clients").insert(d);}
    await reload(); setLoading(false); setModal(false); setSel(null);
  };
  const del=async(id)=>{
    if(!confirm("Excluir cliente?"))return;
    await sb.from("clients").delete().eq("id",id);
    await reload(); setSel(null);
  };
  if(sel){
    const sp=projects.filter(p=>p.client_id===sel.id);
    const totalR=receivables.filter(r=>r.client_id===sel.id&&r.status==="Recebido").reduce((s,r)=>s+r.value,0);
    return(<div>
      <button onClick={()=>setSel(null)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,padding:"7px 14px",borderRadius:8,cursor:"pointer",marginBottom:22,fontSize:13}}>← Voltar</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
        <div><h1 style={{fontSize:24,fontWeight:900,color:C.text,margin:"0 0 4px"}}>{sel.name}</h1><p style={{color:C.textMuted,margin:0,fontSize:13}}>{sel.doc}</p></div>
        <div style={{display:"flex",gap:10}}>
          <Btn primary onClick={()=>{setForm({...sel});setModal(true);}}>Editar</Btn>
          <Btn danger onClick={()=>del(sel.id)}>Excluir</Btn>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:22}}>
        <StatCard label="Projetos" value={sp.length} icon="📐"/>
        <StatCard label="Laudos" value={laudos.filter(l=>l.client_id===sel.id).length} icon="📋" color={C.info}/>
        <StatCard label="Total Recebido" value={fmt(totalR)} icon="💰" color={C.success}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:700,color:C.text}}>Contato</h3>
          {[["Telefone",sel.phone],["Email",sel.email],["Endereco",sel.address],["Cidade",`${sel.city||""}/${sel.state||""}`]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:12,color:C.textMuted}}>{l}</span><span style={{fontSize:12,color:C.text}}>{v||"-"}</span>
            </div>
          ))}
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:700,color:C.text}}>Projetos</h3>
          {sp.length===0?<p style={{color:C.textMuted,fontSize:13}}>Nenhum projeto</p>:sp.map(p=>(
            <div key={p.id} style={{padding:"9px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{p.code}</p><p style={{margin:0,fontSize:11,color:C.textMuted}}>{p.type}</p></div>
              <Badge text={p.status}/>
            </div>
          ))}
        </div>
      </div>
      {modal&&<Modal title="Editar Cliente" onClose={()=>setModal(false)}>
        <G2><Fld label="Nome"><Inp value={form.name||""} onChange={sf("name")}/></Fld><Fld label="Tipo"><Sel value={form.type||""} onChange={sf("type")} options={[{value:"PF",label:"Pessoa Fisica"},{value:"PJ",label:"Pessoa Juridica"}]}/></Fld></G2>
        <G2><Fld label="CPF/CNPJ"><Inp value={form.doc||""} onChange={sf("doc")}/></Fld><Fld label="Telefone"><Inp value={form.phone||""} onChange={sf("phone")}/></Fld></G2>
        <Fld label="Email"><Inp value={form.email||""} onChange={sf("email")}/></Fld>
        <Fld label="Endereco"><Inp value={form.address||""} onChange={sf("address")}/></Fld>
        <G2><Fld label="Cidade"><Inp value={form.city||""} onChange={sf("city")}/></Fld><Fld label="UF"><Inp value={form.state||""} onChange={sf("state")}/></Fld></G2>
        <div style={{display:"flex",gap:12}}><Btn primary onClick={save} style={{flex:1}}>{loading?"Salvando...":"Salvar"}</Btn><Btn onClick={()=>setModal(false)}>Cancelar</Btn></div>
      </Modal>}
    </div>);
  }
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
      <h2 style={{fontSize:22,fontWeight:900,color:C.text,margin:0}}>Clientes</h2>
      <Btn primary onClick={()=>{setForm({type:"PF",state:"MG"});setModal(true);}}>+ Novo Cliente</Btn>
    </div>
    <div style={{marginBottom:18}}><Inp value={search} onChange={setSearch} placeholder="Buscar por nome, CPF/CNPJ..."/></div>
    <Tbl cols={["Nome","Tipo","CPF/CNPJ","Telefone","Email","Cidade","Projetos",""]}
      rows={list.map(c=>[
        <span style={{fontWeight:700,color:C.text,cursor:"pointer",textDecoration:"underline"}} onClick={()=>setSel(c)}>{c.name}</span>,
        <span style={{fontSize:11,padding:"2px 8px",borderRadius:4,background:c.type==="PJ"?C.infoBg:C.graphite,color:c.type==="PJ"?C.info:C.textMuted}}>{c.type}</span>,
        c.doc,c.phone,c.email,`${c.city||""}/${c.state||""}`,
        <span style={{color:C.accent,fontWeight:800}}>{projects.filter(p=>p.client_id===c.id).length}</span>,
        <button onClick={()=>del(c.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.danger,fontSize:16}}>🗑️</button>
      ])}
    />
    {modal&&<Modal title="Novo Cliente" onClose={()=>setModal(false)}>
      <G2><Fld label="Nome Completo"><Inp value={form.name||""} onChange={sf("name")} placeholder="Nome"/></Fld><Fld label="Tipo"><Sel value={form.type||""} onChange={sf("type")} options={[{value:"PF",label:"Pessoa Fisica"},{value:"PJ",label:"Pessoa Juridica"}]}/></Fld></G2>
      <G2><Fld label="CPF/CNPJ"><Inp value={form.doc||""} onChange={sf("doc")}/></Fld><Fld label="Telefone"><Inp value={form.phone||""} onChange={sf("phone")} placeholder="(34) 99999-9999"/></Fld></G2>
      <Fld label="Email"><Inp value={form.email||""} onChange={sf("email")}/></Fld>
      <Fld label="Endereco"><Inp value={form.address||""} onChange={sf("address")}/></Fld>
      <G2><Fld label="Cidade"><Inp value={form.city||""} onChange={sf("city")}/></Fld><Fld label="UF"><Inp value={form.state||""} onChange={sf("state")}/></Fld></G2>
      <Fld label="Observacoes"><textarea value={form.obs||""} onChange={e=>sf("obs")(e.target.value)} rows={3} style={{width:"100%",padding:"10px 14px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:13,outline:"none",resize:"vertical",boxSizing:"border-box"}}/></Fld>
      <div style={{display:"flex",gap:12}}><Btn primary onClick={save} style={{flex:1}}>{loading?"Salvando...":"Salvar Cliente"}</Btn><Btn onClick={()=>setModal(false)}>Cancelar</Btn></div>
    </Modal>}
  </div>);
};

const Projects = ({projects,clients,receivables,reload}) => {
  const [filter,setFilter]=useState("Todos");
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({});
  const [loading,setLoading]=useState(false);
  const PSTYPES=["Arquitetonico","Estrutural","Hidrossanitario","Eletrico","PPCI","SPDA","Regularizacao","Compatibilizacao"];
  const STATUSES=["Orcamento","Contratado","Em desenvolvimento","Revisao","Protocolado","Em analise","Aprovado","Concluido"];
  const filtered=filter==="Todos"?projects:projects.filter(p=>p.status===filter);
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!form.code||!form.client_id)return alert("Codigo e cliente sao obrigatorios!");
    setLoading(true);
    const d={code:form.code,client_id:+form.client_id,type:form.type,responsible:form.responsible,value:+form.value||0,start_date:form.start_date||null,deadline:form.deadline||null,status:form.status||"Orcamento",description:form.description};
    if(form.id){await sb.from("projects").update(d).eq("id",form.id);}
    else{await sb.from("projects").insert(d);}
    await reload(); setLoading(false); setModal(false);
  };
  const del=async(id)=>{
    if(!confirm("Excluir projeto?"))return;
    await sb.from("projects").delete().eq("id",id);
    await reload();
  };
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <h2 style={{fontSize:22,fontWeight:900,color:C.text,margin:0}}>Projetos</h2>
      <Btn primary onClick={()=>{setForm({status:"Orcamento",type:"Arquitetonico"});setModal(true);}}>+ Novo Projeto</Btn>
    </div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>

      <G2><Fld label="Cliente"><Sel value={form.client_id||""} onChange={sf("client_id")} options={clients.map(c=>({value:c.id,label:c.name}))}/></Fld><Fld label="Tipo"><Sel value={form.type||""} onChange={sf("type")} options={PSTYPES}/></Fld></G2>

    const d={category:form.category||"Outros",description:form.description,value:+form.value,due_date:form.due_date||null,status:form.status||"Pendente"};

    {modal&&tab==="pay"&&<Modal title={form.id?"Editar Pagamento":"Novo Pagamento"} onClose={()=>setModal(false)}>

      <Fld label="Descricao"><Inp value={form.description||""} onChange={sf("description")} placeholder="Ex: Salarios Junho"/></Fld>
      <G2><Fld label="Valor (R$)"><Inp value={form.value||""} onChange={sf("value")} type="number"/></Fld><Fld label="Vencimento"><Inp value={form.due_date||""} onChange={sf("due_date")} type="date"/></Fld></G2>
      <div style={{display:"flex",gap:12}}><Btn primary onClick={savePay} style={{flex:1}}>{loading?"Salvando...":"Salvar"}</Btn><Btn onClick={()=>setModal(false)}>Cancelar</Btn></div>
    </Modal>}

const NAV=[{k:"dashboard",l:"Dashboard",ic:"📊"},{k:"clients",l:"Clientes",ic:"👥"},{k:"projects",l:"Projetos",ic:"📐"},{k:"laudos",l:"Laudos",ic:"📋"},{k:"obras",l:"Obras",ic:"🏗️"},{k:"financial",l:"Financeiro",ic:"💰"}];

function App(){
  const [page,setPage]=useState("dashboard");
  const [open,setOpen]=useState(true);
  const [loading,setLoading]=useState(true);
  const [clients,setClients]=useState([]);
  const [projects,setProjects]=useState([]);
  const [laudos,setLaudos]=useState([]);
  const [obras,setObras]=useState([]);
  const [receivables,setReceivables]=useState([]);
  const [payables,setPayables]=useState([]);

  const loadAll=async()=>{
    setLoading(true);
    const [c,p,l,o,r,py]=await Promise.all([
      sb.from("clients").select("*").order("created_at",{ascending:false}),
      sb.from("projects").select("*").order("created_at",{ascending:false}),
      sb.from("laudos").select("*").order("created_at",{ascending:false}),
      sb.from("obras").select("*").order("created_at",{ascending:false}),
      sb.from("financials_receivables").select("*").order("created_at",{ascending:false}),
      sb.from("financials_payables").select("*").order("created_at",{ascending:false}),
    ]);
    setClients(c.data||[]);
    setProjects(p.data||[]);
    setLaudos(l.data||[]);
    setObras(o.data||[]);
    setReceivables(r.data||[]);
    setPayables(py.data||[]);
    setLoading(false);
  };

  useEffect(()=>{loadAll();},[]);

  const W=open?220:60;
  return(
    <div style={{display:"flex",minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <aside style={{width:W,minHeight:"100vh",background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",transition:"width 0.2s ease",overflow:"hidden",position:"sticky",top:0,maxHeight:"100vh"}}>
        <div style={{padding:open?"20px 16px 18px":"18px 12px",borderBottom:`1px solid ${C.border}`}}>
          {open?(<div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:34,height:34,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#000",flexShrink:0}}>PL</div><div><p style={{margin:0,fontSize:14,fontWeight:900,color:C.text}}>PLSilva</p><p style={{margin:0,fontSize:9,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Engenharia</p></div></div>):(<div style={{width:34,height:34,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#000"}}>PL</div>)}
        </div>
        <nav style={{flex:1,padding:"10px 6px",overflowY:"auto"}}>
          {NAV.map(item=>{const active=page===item.k;return(
            <button key={item.k} onClick={()=>setPage(item.k)} title={!open?item.l:""}
              style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:open?"9px 12px":"9px 0",borderRadius:8,border:"none",cursor:"pointer",textAlign:"left",background:active?C.accentDim:"transparent",color:active?C.accentText:C.textMuted,fontSize:12,fontWeight:active?700:500,marginBottom:2,justifyContent:open?"flex-start":"center",borderLeft:active?`3px solid ${C.accent}`:"3px solid transparent"}}
              onMouseEnter={e=>{if(!active){e.currentTarget.style.background=C.surfaceHover;e.currentTarget.style.color=C.text;}}}
              onMouseLeave={e=>{if(!active){e.currentTarget.style.background="transparent";e.currentTarget.style.color=C.textMuted;}}}
            ><span style={{fontSize:16,flexShrink:0}}>{item.ic}</span>{open&&<span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.l}</span>}</button>
          );})}
        </nav>
        <div style={{padding:"10px 6px",borderTop:`1px solid ${C.border}`}}>
          <button onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",justifyContent:open?"flex-start":"center",gap:10,width:"100%",padding:"9px 12px",borderRadius:8,border:"none",cursor:"pointer",background:"transparent",color:C.textMuted,fontSize:12}}
            onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHover}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <span>{open?"◀":"▶"}</span>{open&&<span>Recolher</span>}
          </button>
        </div>
      </aside>
      <main style={{flex:1,padding:"28px 32px",overflowY:"auto",minWidth:0}}>
        {loading?<Loading/>:<>
          {page==="dashboard"&&<Dashboard clients={clients} projects={projects} laudos={laudos} receivables={receivables} payables={payables}/>}
          {page==="clients"&&<Clients clients={clients} projects={projects} laudos={laudos} receivables={receivables} reload={loadAll}/>}
          {page==="projects"&&<Projects projects={projects} clients={clients} receivables={receivables} reload={loadAll}/>}
          {page==="laudos"&&<Laudos laudos={laudos} clients={clients} reload={loadAll}/>}
          {page==="obras"&&<Obras obras={obras} clients={clients} projects={projects} reload={loadAll}/>}
          {page==="financial"&&<Financial receivables={receivables} payables={payables} clients={clients} projects={projects} reload={loadAll}/>}
        </>}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
