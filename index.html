<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const SURL = "https://sreatrvvgxooddhkbago.supabase.co";
const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyZWF0cnZ2Z3hvb2RkaGtiYWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MzUxNjUsImV4cCI6MjA5NjAxMTE2NX0.SOS84j22J7lsIzTaUu-SheVV__d87_YUhhP24puKZvU";
const sb = supabase.createClient(SURL, SKEY);

const C = {
  bg:"#0a0a0a",surface:"#111111",surfaceHover:"#181818",border:"#222222",
  text:"#f0f0f0",textMuted:"#888888",textFaint:"#3a3a3a",
  accent:"#E8A020",accentDim:"#2a1a00",accentText:"#F5C060",
  success:"#22C55E",warning:"#F59E0B",danger:"#EF4444",
  info:"#3B82F6",infoBg:"#0a1a3a",graphite:"#161616",
  purple:"#8B5CF6",cyan:"#06B6D4"

const SC = {
  "Orcamento":{color:"#64748b",bg:"#1e2533"},"Contratado":{color:"#3B82F6",bg:"#0a1a3a"},
  "Em desenvolvimento":{color:"#8B5CF6",bg:"#1a0a3a"},"Revisao":{color:"#F59E0B",bg:"#2a1a00"},
  "Protocolado":{color:"#06B6D4",bg:"#001a2a"},"Em analise":{color:"#F97316",bg:"#2a1000"},
  "Aprovado":{color:"#22C55E",bg:"#0a2e1a"},"Concluido":{color:"#10B981",bg:"#0a2520"},
};

const TIPOS_PROJETO = [
  "Arquitetonico","Estrutural","Hidrossanitario","Eletrico",
  "PSCIP","SPDA","Regularizacao","Compatibilizacao",
  "NBR 12721","PGRCC","Interiores","Outros/Diversos"
];

const fmt = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);
const fmtD = d => d ? new Date(d+"T12:00:00").toLocaleDateString("pt-BR") : "-";
const TODAY = new Date();
const PASTAS = ["Contrato","ART","PDF","DWG","Memorial","Aprovacao","Prefeitura","CBMMG","Foto","Outro"];
const TIPO_ICON = {pdf:"📄",dwg:"📐",docx:"📝",xlsx:"📊",jpg:"🖼️",png:"🖼️",zip:"📦"};
const TIPO_COR = {pdf:"#EF4444",dwg:"#3B82F6",docx:"#8B5CF6",xlsx:"#22C55E",jpg:"#F59E0B",png:"#F59E0B",zip:"#888"};

const TIPO_COR_PROJ = {
  "Arquitetonico":"#E8A020","Estrutural":"#3B82F6","Hidrossanitario":"#06B6D4",
  "Eletrico":"#F59E0B","PSCIP":"#EF4444","SPDA":"#8B5CF6",
  "Regularizacao":"#10B981","Compatibilizacao":"#F97316",
  "NBR 12721":"#22C55E","PGRCC":"#64748b","Outros/Diversos":"#0ea5e9",
  "Interiores":"#ec4899","Outro":"#888"
};

const Badge = ({text}) => {
  const cfg=SC[text]||{color:"#888",bg:"#1a1a1a"};
  return <span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:700,color:cfg.color,background:cfg.bg,border:`1px solid ${cfg.color}33`,whiteSpace:"nowrap"}}>{text}</span>;
};
const Btn = ({children,onClick,style={},primary,small,danger,full}) => (
  <button onClick={onClick} style={{background:primary?C.accent:danger?C.danger:C.border,color:primary?"#000":C.text,border:"none",borderRadius:10,padding:small?"10px 16px":"14px 20px",fontSize:small?13:15,fontWeight:700,cursor:"pointer",width:full?"100%":"auto",minHeight:44,...style}}>{children}</button>
);
const Inp = ({value,onChange,placeholder,type="text"}) => (
  <input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%",padding:"14px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:16,outline:"none",boxSizing:"border-box",minHeight:48}}
    onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
);
const Sel = ({value,onChange,options}) => (
  <select value={value||""} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",padding:"14px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,color:C.text,fontSize:16,outline:"none",cursor:"pointer",minHeight:48}}>
    <option value="">Selecione...</option>
    {options.map(o=><option key={o.value||o} value={o.value!==undefined?o.value:o}>{o.label||o}</option>)}
  </select>
);
const Fld = ({label,children}) => (
  <div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:12,fontWeight:700,color:C.textMuted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</label>
    {children}
  </div>
);
const Modal = ({title,onClose,children}) => (
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.surface,borderRadius:"20px 20px 0 0",width:"100%",maxHeight:"92vh",overflowY:"auto",padding:"24px 20px",paddingBottom:"calc(24px + env(safe-area-inset-bottom, 20px))"}}>
      <div style={{width:40,height:4,background:C.border,borderRadius:2,margin:"0 auto 20px"}}/>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h3 style={{margin:0,fontSize:18,fontWeight:800,color:C.text}}>{title}</h3>
        <button onClick={onClose} style={{background:C.border,border:"none",borderRadius:8,color:C.text,width:36,height:36,fontSize:20,cursor:"pointer"}}>×</button>
      </div>
      {children}
    </div>
  </div>
);
const Loading = () => <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:60,color:C.textMuted,fontSize:14}}>Carregando...</div>;
const PBar = ({value,max,color=C.accent}) => {
  const pct=max>0?Math.min(100,Math.round((value/max)*100)):0;
  return <div style={{background:C.border,borderRadius:4,height:6}}><div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.5s"}}/></div>;
};

// ── DASHBOARD ────────────────────────────────────────────────────────────────
const Dashboard = ({clients,projects,laudos,receivables,payables}) => {
  const pendRec=receivables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const monRec=receivables.filter(r=>r.status==="Recebido").reduce((s,r)=>s+r.value,0);
  const ativos=projects.filter(p=>!["Concluido","Orcamento"].includes(p.status));
  const concluidos=projects.filter(p=>p.status==="Concluido");
  const orcamentos=projects.filter(p=>p.status==="Orcamento");

  const recPorAno = useMemo(()=>{
    const map={};
    receivables.filter(r=>r.status==="Recebido"&&r.due_date).forEach(r=>{
      const ano=r.due_date.substring(0,4);
      map[ano]=(map[ano]||0)+r.value;
    });
    return Object.entries(map).sort((a,b)=>a[0]-b[0]).slice(-6);
  },[receivables]);
  const maxAno=recPorAno.length?Math.max(...recPorAno.map(([,v])=>v)):1;

  // Faturamento por tipo de projeto
  const fatPorTipo = useMemo(()=>{
    const map={};
    projects.forEach(p=>{
      if(!p.type)return;
      if(!map[p.type])map[p.type]={qtd:0,valor:0};
      map[p.type].qtd++;
      map[p.type].valor+=p.value||0;
    });
    return Object.entries(map).sort((a,b)=>b[1].valor-a[1].valor).slice(0,6);
  },[projects]);
  const maxTipo=fatPorTipo.length?Math.max(...fatPorTipo.map(([,v])=>v.valor),1):1;

  return(<div style={{paddingBottom:20}}>
    <div style={{marginBottom:20}}>
      <h1 style={{fontSize:22,fontWeight:900,color:C.text,margin:"0 0 2px"}}>Dashboard</h1>
      <p style={{color:C.textMuted,fontSize:13}}>{TODAY.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
    </div>

    {/* Cards */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
      {[
        {label:"Projetos Ativos",value:ativos.length,sub:"Em execução",icon:"📐",color:C.accent,hl:true},
        {label:"Concluídos",value:concluidos.length,sub:"Finalizados",icon:"✅",color:C.success,hl:true},
        {label:"Orçamentos",value:orcamentos.length,sub:"Aguardando",icon:"📋",color:C.info},
        {label:"Clientes",value:clients.length,sub:"Cadastrados",icon:"👥",color:C.cyan},
        {label:"Receita Recebida",value:fmt(monRec),sub:"Total histórico",icon:"💰",color:C.success,hl:true},
        {label:"A Receber",value:fmt(pendRec),sub:"Pendente",icon:"📥",color:C.warning,hl:true},
      ].map((c,i)=>(
        <div key={i} style={{background:C.surface,border:`1px solid ${c.hl?c.color+"44":C.border}`,borderRadius:12,padding:14,borderTop:c.hl?`2px solid ${c.color}`:`1px solid ${C.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontSize:10,color:C.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>{c.label}</span>
            <span style={{fontSize:18}}>{c.icon}</span>
          </div>
          <div style={{fontSize:typeof c.value==="number"?24:15,fontWeight:900,color:C.text}}>{c.value}</div>
          <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>{c.sub}</div>
        </div>
      ))}
    </div>

    {/* Status projetos */}
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:16}}>
      <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>📊 Status dos Projetos</h3>
      {[
        {label:"Ativos",val:ativos.length,color:C.accent},
        {label:"Concluídos",val:concluidos.length,color:C.success},
        {label:"Orçamentos",val:orcamentos.length,color:C.info},
        {label:"Em Aprovação",val:projects.filter(p=>["Protocolado","Em analise"].includes(p.status)).length,color:C.cyan},
      ].map((item,i)=>(
        <div key={i} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:12,color:C.textMuted}}>{item.label}</span>
            <span style={{fontSize:12,fontWeight:700,color:item.color}}>{item.val}</span>
          </div>
          <PBar value={item.val} max={projects.length||1} color={item.color}/>
        </div>
      ))}
    </div>

    {/* Faturamento por tipo */}
    {fatPorTipo.length>0&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:16}}>
      <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>🏗️ Faturamento por Tipo de Projeto</h3>
      {fatPorTipo.map(([tipo,dados])=>{
        const cor=TIPO_COR_PROJ[tipo]||C.accent;
        return(<div key={tipo} style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:8,height:8,borderRadius:2,background:cor,flexShrink:0}}/>
              <span style={{fontSize:12,color:C.text,fontWeight:600}}>{tipo}</span>
              <span style={{fontSize:11,color:C.textMuted}}>({dados.qtd})</span>
            </div>
            <span style={{fontSize:12,fontWeight:800,color:cor}}>{fmt(dados.valor)}</span>
          </div>
          <PBar value={dados.valor} max={maxTipo} color={cor}/>
        </div>);
      })}
    </div>}

    {/* Receita por Ano */}
    {recPorAno.length>0&&<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:16}}>
      <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>📈 Receita por Ano</h3>
      {recPorAno.map(([ano,val])=>(
        <div key={ano} style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:12,color:C.textMuted,fontWeight:700}}>{ano}</span>
            <span style={{fontSize:12,fontWeight:800,color:C.accentText}}>{fmt(val)}</span>
          </div>
          <PBar value={val} max={maxAno} color={C.accent}/>
        </div>
      ))}
    </div>}

    {/* Projetos recentes */}
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
      <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:800,color:C.text}}>🕐 Projetos Recentes</h3>
      {projects.slice(0,5).map(p=>(
        <div key={p.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style={{margin:0,fontSize:14,fontWeight:700,color:C.text}}>{p.code}</p>
            <p style={{margin:0,fontSize:11,color:C.textMuted}}>{p.type} · {fmt(p.value||0)}</p>
          </div>
          <Badge text={p.status}/>
        </div>
      ))}
      {projects.length===0&&<p style={{color:C.textMuted,fontSize:13}}>Nenhum projeto cadastrado</p>}
    </div>
  </div>);
};

// ── RELATÓRIOS ───────────────────────────────────────────────────────────────
const Relatorios = ({receivables,payables,projects,clients}) => {
  const [anoFiltro,setAnoFiltro]=useState("Todos");
  const [abaRel,setAbaRel]=useState("anos");

  const recPorAno=useMemo(()=>{
    const map={};
    receivables.filter(r=>r.status==="Recebido"&&r.due_date).forEach(r=>{
      const ano=r.due_date.substring(0,4);
      if(!map[ano])map[ano]={total:0,qtd:0};
      map[ano].total+=r.value;map[ano].qtd++;
    });
    return Object.entries(map).sort((a,b)=>b[0]-a[0]);
  },[receivables]);

  const anos=["Todos",...recPorAno.map(([a])=>a)];
  const maxVal=recPorAno.length?Math.max(...recPorAno.map(([,v])=>v.total)):1;
  const totalGeral=recPorAno.reduce((s,[,v])=>s+v.total,0);

  const recPorMes=useMemo(()=>{
    if(anoFiltro==="Todos")return[];
    const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    const map=Array(12).fill(0);
    receivables.filter(r=>r.status==="Recebido"&&r.due_date&&r.due_date.startsWith(anoFiltro)).forEach(r=>{
      const mes=parseInt(r.due_date.substring(5,7))-1;
      map[mes]+=r.value;
    });
    return map.map((v,i)=>({mes:MESES[i],val:v}));
  },[receivables,anoFiltro]);
  const maxMes=recPorMes.length?Math.max(...recPorMes.map(r=>r.val),1):1;

  // Faturamento por tipo de projeto
  const fatPorTipo=useMemo(()=>{
    const map={};
    projects.forEach(p=>{
      if(!p.type)return;
      if(!map[p.type])map[p.type]={qtd:0,valor:0,concluidos:0};
      map[p.type].qtd++;
      map[p.type].valor+=p.value||0;
      if(p.status==="Concluido")map[p.type].concluidos++;
    });
    return Object.entries(map).sort((a,b)=>b[1].valor-a[1].valor);
  },[projects]);
  const maxTipo=fatPorTipo.length?Math.max(...fatPorTipo.map(([,v])=>v.valor),1):1;
  const totalTipos=fatPorTipo.reduce((s,[,v])=>s+v.valor,0);

  return(<div>
    <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:"0 0 4px"}}>Relatórios</h2>
    <p style={{color:C.textMuted,fontSize:13,marginBottom:16}}>Análise financeira histórica</p>

    {/* Total geral */}
    <div style={{background:`linear-gradient(135deg,${C.accentDim},#1a1000)`,border:`1px solid ${C.accent}44`,borderRadius:14,padding:20,marginBottom:16,textAlign:"center"}}>
      <p style={{margin:"0 0 4px",fontSize:11,color:C.accentText,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Receita Total Histórica</p>
      <p style={{margin:0,fontSize:28,fontWeight:900,color:C.accent}}>{fmt(totalGeral)}</p>
      <p style={{margin:"4px 0 0",fontSize:12,color:C.textMuted}}>{receivables.filter(r=>r.status==="Recebido").length} recebimentos · {clients.length} clientes</p>
    </div>

    {/* Abas */}
    <div style={{display:"flex",gap:4,background:C.graphite,borderRadius:10,padding:4,marginBottom:16}}>
      {[["anos","Por Ano"],["tipos","Por Tipo"]].map(([k,l])=>(
        <button key={k} onClick={()=>setAbaRel(k)} style={{flex:1,padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:abaRel===k?C.surface:"transparent",color:abaRel===k?C.text:C.textMuted,fontSize:13,fontWeight:700,minHeight:40}}>{l}</button>
      ))}
    </div>

    {abaRel==="anos"&&<>
      {/* Filtro ano */}
      <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
        {anos.map(a=>(
          <button key={a} onClick={()=>setAnoFiltro(a)} style={{padding:"8px 16px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:`1px solid ${anoFiltro===a?C.accent:C.border}`,background:anoFiltro===a?C.accentDim:"transparent",color:anoFiltro===a?C.accentText:C.textMuted,whiteSpace:"nowrap",minHeight:36}}>{a}</button>
        ))}
      </div>

      {/* Gráfico mensal */}
      {anoFiltro!=="Todos"&&recPorMes.length>0&&(
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:16}}>
          <h3 style={{margin:"0 0 16px",fontSize:14,fontWeight:800,color:C.text}}>📅 Mês a Mês — {anoFiltro}</h3>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:100}}>
            {recPorMes.map(({mes,val})=>{
              const pct=maxMes>0?Math.max(4,Math.round((val/maxMes)*100)):4;
              return(<div key={mes} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{width:"100%",height:`${pct}%`,background:val>0?C.accent:C.border,borderRadius:"4px 4px 0 0",minHeight:4}}/>
                <span style={{fontSize:9,color:C.textMuted}}>{mes}</span>
              </div>);
            })}
          </div>
          <div style={{marginTop:10,textAlign:"center"}}>
            <span style={{fontSize:14,color:C.accentText,fontWeight:800}}>{fmt(recPorMes.reduce((s,r)=>s+r.val,0))}</span>
            <span style={{fontSize:11,color:C.textMuted}}> total em {anoFiltro}</span>
          </div>
        </div>
      )}

      {/* Tabela por ano */}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
        <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>📊 Receita por Ano</h3>
        {(anoFiltro==="Todos"?recPorAno:recPorAno.filter(([a])=>a===anoFiltro)).map(([ano,dados])=>(
          <div key={ano} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div>
                <span style={{fontSize:15,fontWeight:800,color:C.text}}>{ano}</span>
                <span style={{fontSize:11,color:C.textMuted,marginLeft:8}}>{dados.qtd} recebimentos</span>
              </div>
              <span style={{fontSize:14,fontWeight:900,color:C.accentText}}>{fmt(dados.total)}</span>
            </div>
            <PBar value={dados.total} max={maxVal} color={C.accent}/>
          </div>
        ))}
      </div>
    </>}

    {abaRel==="tipos"&&<>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:16}}>
        <h3 style={{margin:"0 0 4px",fontSize:14,fontWeight:800,color:C.text}}>🏗️ Faturamento por Tipo de Projeto</h3>
        <p style={{margin:"0 0 14px",fontSize:11,color:C.textMuted}}>Total cadastrado: {fmt(totalTipos)}</p>
        {fatPorTipo.length===0&&<p style={{color:C.textMuted,fontSize:13}}>Nenhum projeto cadastrado ainda</p>}
        {fatPorTipo.map(([tipo,dados])=>{
          const cor=TIPO_COR_PROJ[tipo]||C.accent;
          const pct=totalTipos>0?((dados.valor/totalTipos)*100).toFixed(1):0;
          return(<div key={tipo} style={{marginBottom:16}}>

  const [sel,setSel]=useState(null);
  const [form,setForm]=useState({});
  const [loading,setLoading]=useState(false);

  const filtered=filter==="Todos"?projects:projects.filter(p=>p.status===filter);
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const save=async()=>{
    if(!form.code||!form.client_id)return alert("Codigo e cliente obrigatorios!");
    setLoading(true);
    const d={code:form.code,client_id:+form.client_id,type:form.type,responsible:form.responsible,value:+form.value||0,start_date:form.start_date||null,deadline:form.deadline||null,status:form.status||"Orcamento",description:form.description};
    if(form.id){await sb.from("projects").update(d).eq("id",form.id);}else{await sb.from("projects").insert(d);}
    await reload();setLoading(false);setModal(false);setSel(null);
  };
  const del=async(id)=>{if(!confirm("Excluir?"))return;await sb.from("projects").delete().eq("id",id);await reload();setSel(null);};

  // Faturamento por tipo

    const map={};

      if(!p.type)return;

      map[p.type].qtd++;map[p.type].valor+=p.value||0;

    return Object.entries(map).sort((a,b)=>b[1].valor-a[1].valor);

      <button onClick={()=>setSel(null)} style={{background:"none",border:"none",color:C.accent,fontSize:16,cursor:"pointer",marginBottom:16,padding:0}}>← Voltar</button>

          <div key={l} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:12,textAlign:"center"}}>
            <div style={{fontSize:20,marginBottom:4}}>{ic}</div>

// ── DOCUMENTOS ───────────────────────────────────────────────────────────────
const Documentos = ({projects}) => {
  const [docs,setDocs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [uploading,setUploading]=useState(false);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({project_id:"",pasta:"Contrato"});
  const [file,setFile]=useState(null);
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const loadDocs=async()=>{setLoading(true);const{data}=await sb.from("documentos").select("*").order("created_at",{ascending:false});setDocs(data||[]);setLoading(false);};
  useEffect(()=>{loadDocs();},[]);
  const upload=async()=>{
    if(!file||!form.project_id)return alert("Selecione projeto e arquivo!");
    setUploading(true);
    const ext=file.name.split(".").pop().toLowerCase();
    const path=`${form.project_id}/${form.pasta}/${Date.now()}_${file.name}`;
    const{error}=await sb.storage.from("documentos").upload(path,file);
    if(error){alert("Erro: "+error.message);setUploading(false);return;}
    const{data:u}=sb.storage.from("documentos").getPublicUrl(path);
    await sb.from("documentos").insert({project_id:+form.project_id,pasta:form.pasta,nome:file.name,tipo:ext,tamanho:file.size,url:u.publicUrl,path});
    await loadDocs();setUploading(false);setModal(false);setFile(null);setForm({project_id:"",pasta:"Contrato"});
  };
  const del=async(doc)=>{if(!confirm("Excluir?"))return;await sb.storage.from("documentos").remove([doc.path]);await sb.from("documentos").delete().eq("id",doc.id);await loadDocs();};
  const fmtSize=b=>{if(!b)return"-";if(b>1024*1024)return`${(b/1024/1024).toFixed(1)} MB`;return`${(b/1024).toFixed(0)} KB`;};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:0}}>Documentos</h2>
      <Btn small primary onClick={()=>setModal(true)}>+ Upload</Btn>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {loading?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Carregando...</div>:
      docs.length===0?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum documento</div>:
      docs.map(doc=>{
        const ext=doc.tipo||"pdf";const proj=projects.find(p=>p.id===doc.project_id);
        return(<div key={doc.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14,display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:44,height:44,borderRadius:10,background:(TIPO_COR[ext]||"#888")+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{TIPO_ICON[ext]||"📄"}</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.nome}</p>
            <p style={{margin:0,fontSize:11,color:C.textMuted}}>{doc.pasta} · {fmtSize(doc.tamanho)}</p>
            {proj&&<p style={{margin:0,fontSize:11,color:C.accent,fontFamily:"monospace"}}>{proj.code}</p>}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <a href={doc.url} target="_blank" style={{background:C.infoBg,color:C.info,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,textDecoration:"none",textAlign:"center"}}>↓</a>
            <button onClick={()=>del(doc)} style={{background:"#2a0a0a",color:C.danger,border:"none",borderRadius:6,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>🗑️</button>
          </div>
        </div>);
      })}
    </div>
    {modal&&<Modal title="Upload de Arquivo" onClose={()=>{setModal(false);setFile(null);}}>
      <Fld label="Projeto"><Sel value={form.project_id} onChange={sf("project_id")} options={projects.map(p=>({value:p.id,label:`${p.code} — ${p.type}`}))}/></Fld>
      <Fld label="Categoria"><Sel value={form.pasta} onChange={sf("pasta")} options={PASTAS}/></Fld>
      <Fld label="Arquivo">
        <div style={{border:`2px dashed ${file?C.success:C.border}`,borderRadius:12,padding:30,textAlign:"center",cursor:"pointer"}} onClick={()=>document.getElementById("fi").click()}>
          <input id="fi" type="file" style={{display:"none"}} onChange={e=>{if(e.target.files[0])setFile(e.target.files[0]);}} accept=".pdf,.dwg,.docx,.xlsx,.jpg,.jpeg,.png,.zip"/>
          {file?<><p style={{fontSize:28,margin:"0 0 8px"}}>✅</p><p style={{fontSize:14,fontWeight:700,color:C.success,margin:0}}>{file.name}</p></>
          :<><p style={{fontSize:36,margin:"0 0 8px"}}>📁</p><p style={{color:C.textMuted,fontSize:14,margin:0}}>Toque para selecionar</p></>}
        </div>
      </Fld>
      <Btn full primary onClick={upload} style={{marginTop:8}}>{uploading?"Enviando...":"Fazer Upload"}</Btn>
    </Modal>}
  </div>);
};

function App(){
  const [page,setPage]=useState("dashboard");

  const [projects,setProjects]=useState([]);

  const loadAll=async()=>{
    setLoading(true);

      sb.from("clients").select("*").order("name"),
      sb.from("projects").select("*").order("created_at",{ascending:false}),
      sb.from("laudos").select("*").order("created_at",{ascending:false}),
      sb.from("financials_receivables").select("*").order("due_date",{ascending:false}),
      sb.from("financials_payables").select("*").order("created_at",{ascending:false}),
    ]);
    setClients(c.data||[]);setProjects(p.data||[]);setLaudos(l.data||[]);
    setReceivables(r.data||[]);setPayables(py.data||[]);
    setLoading(false);
  };
  useEffect(()=>{loadAll();},[]);

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:C.bg}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:100,paddingTop:"calc(12px + env(safe-area-inset-top, 0px))"}}>

      <div style={{flex:1,padding:16,paddingBottom:80,overflowY:"auto"}}>
        {loading?<Loading/>:<>
          {page==="dashboard"&&<Dashboard clients={clients} projects={projects} laudos={laudos} receivables={receivables} payables={payables}/>}
          {page==="clientes"&&<Clients clients={clients} projects={projects} laudos={laudos} receivables={receivables} reload={loadAll}/>}
          {page==="projetos"&&<Projects projects={projects} clients={clients} receivables={receivables} reload={loadAll}/>}
          {page==="documentos"&&<Documentos projects={projects}/>}
          {page==="laudos"&&<Laudos laudos={laudos} clients={clients} reload={loadAll}/>}
          {page==="relatorios"&&<Relatorios receivables={receivables} payables={payables} projects={projects} clients={clients}/>}
          {page==="financeiro"&&<Financial receivables={receivables} payables={payables} clients={clients} projects={projects} reload={loadAll}/>}
        </>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",overflowX:"auto",paddingBottom:"env(safe-area-inset-bottom, 0px)",zIndex:100}}>
        {NAV.map(item=>{const active=page===item.k;return(
          <button key={item.k} onClick={()=>setPage(item.k)} style={{flex:"0 0 auto",minWidth:60,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"8px 10px",border:"none",cursor:"pointer",background:"transparent",color:active?C.accent:C.textMuted,fontSize:9,fontWeight:active?700:500,gap:3,minHeight:56,borderTop:active?`2px solid ${C.accent}`:"2px solid transparent"}}>
            <span style={{fontSize:18}}>{item.ic}</span>
            <span style={{whiteSpace:"nowrap"}}>{item.l}</span>
          </button>
        );})}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
