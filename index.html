const FluxoCaixa = ({receivables, payables}) => {
  const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const anoAtual = new Date().getFullYear();
  const [ano,setAno] = useState(String(anoAtual));

  const anos = useMemo(()=>{
    const s = new Set();
    receivables.forEach(r=>{if(r.due_date)s.add(r.due_date.substring(0,4));});
    payables.forEach(p=>{if(p.due_date)s.add(p.due_date.substring(0,4));});
    return Array.from(s).sort((a,b)=>b-a);
  },[receivables,payables]);

  const dados = useMemo(()=>{
    return meses.map((_,i)=>{
      const m = String(i+1).padStart(2,"0");
      const prefix = ano+"-"+m;
      const entrada = receivables.filter(r=>r.status==="Recebido"&&(r.due_date||"").startsWith(prefix)).reduce((s,r)=>s+r.value,0);
      const saida = payables.filter(p=>p.status==="Pago"&&(p.due_date||"").startsWith(prefix)).reduce((s,p)=>s+p.value,0);
      return {mes:meses[i], entrada, saida, saldo:entrada-saida};
    });
  },[receivables,payables,ano]);

  const maxVal = Math.max(...dados.map(d=>Math.max(d.entrada,d.saida)),1);
  const totalEntrada = dados.reduce((s,d)=>s+d.entrada,0);
  const totalSaida = dados.reduce((s,d)=>s+d.saida,0);

  return(<div>
    <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
      {anos.map(a=>(
        <button key={a} onClick={()=>setAno(a)} style={{padding:"7px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid "+(ano===a?C.accent:C.border),background:ano===a?C.accentDim:"transparent",color:ano===a?C.accentText:C.textMuted,whiteSpace:"nowrap"}}>{a}</button>
      ))}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
      {[
        {l:"Entradas",v:fmt(totalEntrada),c:C.success},
        {l:"Saidas",v:fmt(totalSaida),c:C.danger},
        {l:"Saldo",v:fmt(totalEntrada-totalSaida),c:totalEntrada>=totalSaida?C.success:C.danger},
      ].map(({l,v,c})=>(
        <div key={l} style={{background:C.surface,border:"1px solid "+c+"44",borderRadius:10,padding:12,textAlign:"center",borderTop:"2px solid "+c}}>
          <p style={{margin:"0 0 4px",fontSize:10,color:C.textMuted,fontWeight:700,textTransform:"uppercase"}}>{l}</p>
          <p style={{margin:0,fontSize:13,fontWeight:900,color:c}}>{v}</p>
        </div>
      ))}
    </div>

    {/* Grafico de barras */}
    <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,marginBottom:16}}>
      <h3 style={{margin:"0 0 16px",fontSize:14,fontWeight:800,color:C.text}}>📊 Entradas vs Saídas — {ano}</h3>
      <div style={{display:"flex",alignItems:"flex-end",gap:3,height:120,marginBottom:8}}>
        {dados.map(({mes,entrada,saida})=>{
          const hE = maxVal>0?Math.max(4,Math.round((entrada/maxVal)*110)):4;
          const hS = maxVal>0?Math.max(0,Math.round((saida/maxVal)*110)):0;
          return(<div key={mes} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
            <div style={{width:"100%",display:"flex",gap:1,alignItems:"flex-end",height:110}}>
              <div style={{flex:1,height:hE,background:C.success,borderRadius:"3px 3px 0 0",opacity:0.85}}/>
              <div style={{flex:1,height:hS,background:C.danger,borderRadius:"3px 3px 0 0",opacity:0.85}}/>
            </div>
            <span style={{fontSize:8,color:C.textMuted}}>{mes}</span>
          </div>);
        })}
      </div>
      <div style={{display:"flex",gap:16,justifyContent:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,background:C.success,borderRadius:2}}/><span style={{fontSize:11,color:C.textMuted}}>Entradas</span></div>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,background:C.danger,borderRadius:2}}/><span style={{fontSize:11,color:C.textMuted}}>Saídas</span></div>
      </div>
    </div>

    {/* Tabela mensal */}
    <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16}}>
      <h3 style={{margin:"0 0 12px",fontSize:14,fontWeight:800,color:C.text}}>Detalhes Mensais</h3>
      {dados.filter(d=>d.entrada>0||d.saida>0).map(d=>(
        <div key={d.mes} style={{padding:"10px 0",borderBottom:"1px solid "+C.border}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <span style={{fontSize:13,fontWeight:700,color:C.text}}>{d.mes}</span>
            <span style={{fontSize:13,fontWeight:800,color:d.saldo>=0?C.success:C.danger}}>{fmt(d.saldo)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:11,color:C.success}}>↑ {fmt(d.entrada)}</span>
            <span style={{fontSize:11,color:C.danger}}>↓ {fmt(d.saida)}</span>
          </div>
        </div>
      ))}
      {dados.every(d=>d.entrada===0&&d.saida===0)&&<p style={{color:C.textMuted,fontSize:13,textAlign:"center",padding:20}}>Nenhum dado em {ano}</p>}
    </div>
  </div>);
};
const Relatorios = ({receivables,payables,projects,clients}) => {
  const [anoFiltro,setAnoFiltro]=useState("Todos");
  const [abaRel,setAbaRel]=useState("anos");
  const recPorAno=useMemo(()=>{
    const map={};
    receivables.filter(r=>r.status==="Recebido"&&r.due_date).forEach(r=>{
      const ano=r.due_date.substring(0,4);
      if(!map[ano])map[ano]={total:0,qtd:0};
      map[ano].total+=r.value;map[ano].qtd++;
    });
    return Object.entries(map).sort((a,b)=>b[0]-a[0]);

        </div>

        {/* Acumulado do Mes - grande destaque */}
        <div style={{background:"linear-gradient(135deg,"+C.accentDim+",#1a1200)",border:"1px solid "+C.accent+"66",borderRadius:14,padding:20,marginBottom:16,borderLeft:"4px solid "+C.accent}}>
          <p style={{margin:"0 0 6px",fontSize:12,color:C.accentText,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Faturamento — {nomeMes.charAt(0).toUpperCase()+nomeMes.slice(1)}</p>
          <p style={{margin:0,fontSize:32,fontWeight:900,color:C.accent}}>{fmt(totalMes)}</p>
          <p style={{margin:"4px 0 0",fontSize:12,color:C.textMuted}}>
            {totalAno>0?(((totalMes/totalAno)*100).toFixed(1)+"% do acumulado do ano"):""}
          </p>
        </div>
      </>);
    })()}
    <div style={{display:"flex",gap:4,background:C.graphite,borderRadius:10,padding:4,marginBottom:16}}>
      {[["anos","Por Ano"],["tipos","Por Tipo"],["fluxo","Fluxo de Caixa"]].map(([k,l])=>(
        <button key={k} onClick={()=>setAbaRel(k)} style={{flex:1,padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:abaRel===k?C.surface:"transparent",color:abaRel===k?C.text:C.textMuted,fontSize:12,fontWeight:700,minHeight:40}}>{l}</button>
      ))}
    </div>
    {abaRel==="anos"&&<>
      <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:16,paddingBottom:4}}>
        {anos.map(a=>(
          <button key={a} onClick={()=>setAnoFiltro(a)} style={{padding:"8px 16px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:`1px solid ${anoFiltro===a?C.accent:C.border}`,background:anoFiltro===a?C.accentDim:"transparent",color:anoFiltro===a?C.accentText:C.textMuted,whiteSpace:"nowrap",minHeight:36}}>{a}</button>

      </div>
      {anoFiltro!=="Todos"&&recPorMes.length>0&&(
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:16}}>
          <h3 style={{margin:"0 0 16px",fontSize:14,fontWeight:800,color:C.text}}>📅 Mês a Mês — {anoFiltro}</h3>
          <div style={{display:"flex",alignItems:"flex-end",gap:4,height:100}}>
            {recPorMes.map(({mes,val})=>{

          </div>
          <div style={{marginTop:10,textAlign:"center"}}>
            <span style={{fontSize:14,color:C.accentText,fontWeight:800}}>{fmt(recPorMes.reduce((s,r)=>s+r.val,0))}</span>

          </div>
        </div>
      )}
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
        <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>📊 Receita por Ano</h3>

          <div key={ano} style={{marginBottom:16}}>

      </div>
    </>}
    {abaRel==="tipos"&&<>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:16}}>
        <h3 style={{margin:"0 0 4px",fontSize:14,fontWeight:800,color:C.text}}>🏗️ Faturamento por Tipo</h3>
        <p style={{margin:"0 0 14px",fontSize:11,color:C.textMuted}}>Total: {fmt(totalTipos)}</p>
        {fatPorTipo.map(([tipo,dados])=>{
          const cor=TIPO_COR_PROJ[tipo]||C.accent;
          const pct=totalTipos>0?((dados.valor/totalTipos)*100).toFixed(1):0;
          return(<div key={tipo} style={{marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>

              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:13,fontWeight:900,color:cor}}>{fmt(dados.valor)}</div>
                <div style={{fontSize:11,color:C.textMuted}}>{pct}%</div>
              </div>
            </div>
            <PBar value={dados.valor} max={maxTipo} color={cor}/>
          </div>);
        })}
      </div>
    </>}
  </div>);
};

      <Btn full primary onClick={upload} style={{marginTop:8}}>{uploading?"Enviando...":"Fazer Upload"}</Btn>
    </Modal>}
  </div>);
};

const PASTAS_DESIGNER = ["Briefing","Planta","Perspectiva","Moodboard","Especificacao","Foto Referencia","Entregavel","Outro"];

const Designer = ({projects}) => {
  const [docs,setDocs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [uploading,setUploading]=useState(false);
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({project_id:"",pasta:"Briefing",cliente:""});
  const [file,setFile]=useState(null);
  const [filtPasta,setFiltPasta]=useState("");
  const [busca,setBusca]=useState("");
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));

  const loadDocs=async()=>{
    setLoading(true);
    const{data}=await sb.from("designer_docs").select("*").order("created_at",{ascending:false});
    setDocs(data||[]);
    setLoading(false);
  };
  useEffect(()=>{loadDocs();},[]);

  const upload=async()=>{
    if(!file||!form.cliente)return alert("Preencha o cliente e selecione um arquivo!");
    setUploading(true);
    const ext=file.name.split(".").pop().toLowerCase();
    const path="designer/"+form.cliente.replace(/[^a-zA-Z0-9]/g,"_")+"/"+form.pasta+"/"+Date.now()+"_"+file.name;
    const{error}=await sb.storage.from("documentos").upload(path,file);
    if(error){alert("Erro: "+error.message);setUploading(false);return;}
    const{data:u}=sb.storage.from("documentos").getPublicUrl(path);
    await sb.from("designer_docs").insert({
      cliente:form.cliente,pasta:form.pasta,nome:file.name,
      tipo:ext,tamanho:file.size,url:u.publicUrl,path
    });
    await loadDocs();setUploading(false);setModal(false);setFile(null);
    setForm({project_id:"",pasta:"Briefing",cliente:""});
  };

  const del=async(doc)=>{
    if(!confirm("Excluir?"))return;
    await sb.storage.from("documentos").remove([doc.path]);
    await sb.from("designer_docs").delete().eq("id",doc.id);
    await loadDocs();
  };

  const fmtSize=b=>{if(!b)return"-";if(b>1024*1024)return(b/1024/1024).toFixed(1)+" MB";return(b/1024).toFixed(0)+" KB";};
  const TIPO_IC={pdf:"📄",dwg:"📐",docx:"📝",xlsx:"📊",jpg:"🖼️",jpeg:"🖼️",png:"🖼️",zip:"📦",mp4:"🎬",psd:"🎨",ai:"🎨"};

  const filtered=docs.filter(d=>{
    if(filtPasta&&d.pasta!==filtPasta)return false;
    if(busca&&!(d.cliente||"").toLowerCase().includes(busca.toLowerCase())&&!(d.nome||"").toLowerCase().includes(busca.toLowerCase()))return false;
    return true;
  });

  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div>
        <h2 style={{fontSize:20,fontWeight:900,color:C.text,margin:"0 0 2px"}}>Designer de Interiores</h2>
        <p style={{fontSize:12,color:C.textMuted,margin:0}}>Briefings, plantas, perspectivas e entregaveis</p>
      </div>
      <Btn small primary onClick={()=>setModal(true)}>+ Upload</Btn>
    </div>

    <div style={{marginBottom:12}}>
      <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar por cliente ou arquivo..."
        style={{width:"100%",padding:"12px 14px",background:C.bg,border:"1px solid "+C.border,borderRadius:10,color:C.text,fontSize:16,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
        <button onClick={()=>setFiltPasta("")} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid "+(filtPasta===""?C.accent:C.border),background:filtPasta===""?C.accentDim:"transparent",color:filtPasta===""?C.accentText:C.textMuted,whiteSpace:"nowrap"}}>Todos</button>
        {PASTAS_DESIGNER.map(p=>(
          <button key={p} onClick={()=>setFiltPasta(p)} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid "+(filtPasta===p?C.accent:C.border),background:filtPasta===p?C.accentDim:"transparent",color:filtPasta===p?C.accentText:C.textMuted,whiteSpace:"nowrap"}}>{p}</button>
        ))}
      </div>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {loading?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Carregando...</div>:
      filtered.length===0?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum arquivo encontrado</div>:
      filtered.map(doc=>{
        const ext=doc.tipo||"pdf";
        return(<div key={doc.id} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:14,display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:44,height:44,borderRadius:10,background:C.purple+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{TIPO_IC[ext]||"📄"}</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.nome}</p>
            <p style={{margin:0,fontSize:11,color:C.purple}}>{doc.cliente}</p>
            <p style={{margin:0,fontSize:11,color:C.textMuted}}>{doc.pasta+" · "+fmtSize(doc.tamanho)}</p>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
            <a href={doc.url} target="_blank" style={{background:C.infoBg,color:C.info,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,textDecoration:"none",textAlign:"center"}}>↓</a>
            <button onClick={()=>del(doc)} style={{background:"#2a0a0a",color:C.danger,border:"none",borderRadius:6,padding:"6px 10px",fontSize:12,cursor:"pointer"}}>🗑️</button>
          </div>
        </div>);
      })}
    </div>

    {modal&&<Modal title="Upload Designer" onClose={()=>{setModal(false);setFile(null);}}>
      <Fld label="Cliente"><Inp value={form.cliente} onChange={sf("cliente")} placeholder="Nome do cliente"/></Fld>
      <Fld label="Categoria"><Sel value={form.pasta} onChange={sf("pasta")} options={PASTAS_DESIGNER}/></Fld>
      <Fld label="Arquivo">
        <div style={{border:"2px dashed "+(file?C.success:C.border),borderRadius:12,padding:30,textAlign:"center",cursor:"pointer"}} onClick={()=>document.getElementById("fi2").click()}>
          <input id="fi2" type="file" style={{display:"none"}} onChange={e=>{if(e.target.files[0])setFile(e.target.files[0]);}}
            accept=".pdf,.dwg,.docx,.xlsx,.jpg,.jpeg,.png,.zip,.mp4,.psd,.ai"/>
          {file?<><p style={{fontSize:28,margin:"0 0 8px"}}>✅</p><p style={{fontSize:14,fontWeight:700,color:C.success,margin:0}}>{file.name}</p></>
          :<><p style={{fontSize:36,margin:"0 0 8px"}}>🎨</p><p style={{color:C.textMuted,fontSize:14,margin:0}}>Toque para selecionar</p><p style={{color:C.textFaint,fontSize:11,margin:"4px 0 0"}}>PDF, JPG, PNG, DWG, AI, PSD, MP4...</p></>}
        </div>
      </Fld>
      <Btn full primary onClick={upload} style={{marginTop:8}}>{uploading?"Enviando...":"Fazer Upload"}</Btn>
    </Modal>}
  </div>);
};

    </div>

    <div style={{marginBottom:12}}>
      <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar por cliente ou descricao..."
        style={{width:"100%",padding:"12px 14px",background:C.bg,border:"1px solid "+C.border,borderRadius:10,color:C.text,fontSize:16,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
        {["","Pendente","Assinado","Em andamento","Concluido","Cancelado"].map(s=>(
          <button key={s} onClick={()=>setFiltStatus(s)} style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",border:"1px solid "+(filtStatus===s?C.accent:C.border),background:filtStatus===s?C.accentDim:"transparent",color:filtStatus===s?C.accentText:C.textMuted,whiteSpace:"nowrap"}}>{s||"Todos"}</button>
        ))}
      </div>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {loading?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Carregando...</div>:
      filtered.length===0?<div style={{padding:40,textAlign:"center",color:C.textMuted}}>Nenhum contrato</div>:
      filtered.map(c=>{
        const cl=clients.find(x=>x.id===c.client_id);
        const pj=projects.find(x=>x.id===c.project_id);
        const cor=STATUS_COR[c.status]||C.textMuted;
        return(<div key={c.id} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:12,padding:16,borderLeft:"3px solid "+cor}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div style={{flex:1,paddingRight:8}}>
              <p style={{margin:0,fontSize:15,fontWeight:800,color:C.text}}>{cl?.name||"-"}</p>
              <p style={{margin:"2px 0 0",fontSize:13,color:C.textMuted}}>{c.descricao}</p>
              {pj&&<p style={{margin:"2px 0 0",fontSize:11,color:C.accent,fontFamily:"monospace"}}>{pj.code}</p>}
            </div>
            <span style={{padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:700,color:cor,background:cor+"22",whiteSpace:"nowrap"}}>{c.status}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
            <div>
              <p style={{margin:0,fontSize:14,fontWeight:800,color:C.success}}>{fmt(c.valor)}</p>
              <p style={{margin:0,fontSize:11,color:C.textMuted}}>{"Assinatura: "+fmtD(c.data_assinatura)+" · Venc: "+fmtD(c.data_vencimento)}</p>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setForm({...c,client_id:String(c.client_id),project_id:String(c.project_id||""),valor:String(c.valor)});setModal(true);}} style={{background:"none",border:"none",cursor:"pointer",color:C.info,fontSize:20}}>✏️</button>
              <button onClick={()=>del(c.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.danger,fontSize:20}}>🗑️</button>
            </div>
          </div>
        </div>);
      })}
    </div>

    {modal&&<Modal title={form.id?"Editar Contrato":"Novo Contrato"} onClose={()=>setModal(false)}>
      <Fld label="Cliente"><Sel value={form.client_id||""} onChange={sf("client_id")} options={clients.map(c=>({value:c.id,label:c.name}))}/></Fld>
      <Fld label="Projeto"><Sel value={form.project_id||""} onChange={sf("project_id")} options={projects.map(p=>({value:p.id,label:p.code+" - "+p.type}))}/></Fld>
      <Fld label="Descricao"><Inp value={form.descricao||""} onChange={sf("descricao")} placeholder="Ex: Contrato de prestacao de servicos"/></Fld>
      <Fld label="Valor (R$)"><Inp value={form.valor||""} onChange={sf("valor")} type="number"/></Fld>
      <Fld label="Status"><Sel value={form.status||""} onChange={sf("status")} options={["Pendente","Assinado","Em andamento","Concluido","Cancelado"]}/></Fld>
      <Fld label="Data Assinatura"><Inp value={form.data_assinatura||""} onChange={sf("data_assinatura")} type="date"/></Fld>
      <Fld label="Data Vencimento"><Inp value={form.data_vencimento||""} onChange={sf("data_vencimento")} type="date"/></Fld>
      <Fld label="Observacoes"><textarea value={form.obs||""} onChange={e=>sf("obs")(e.target.value)} rows={3}
        style={{width:"100%",padding:"10px",background:C.bg,border:"1px solid "+C.border,borderRadius:8,color:C.text,fontSize:14,outline:"none",resize:"none",boxSizing:"border-box"}}/></Fld>
      <Btn full primary onClick={save} style={{marginTop:8}}>{form.id?"Salvar":"Criar Contrato"}</Btn>
    </Modal>}
    </>}
  </div>);
};
const NAV=[
  {k:"dashboard",l:"Início",ic:"📊"},
  {k:"clientes",l:"Clientes",ic:"👥"},
  {k:"projetos",l:"Projetos",ic:"📐"},
  {k:"documentos",l:"Docs",ic:"📁"},
  {k:"relatorios",l:"Relatórios",ic:"📈"},
  {k:"orcamentos",l:"Orçamento",ic:"📄"},
  {k:"designer",l:"Designer",ic:"🎨"},
  {k:"contratos",l:"Contratos",ic:"📑"},
  {k:"financeiro",l:"Financeiro",ic:"💰"},
];
function App(){
  const [page,setPage]=useState("dashboard");
  const [loading,setLoading]=useState(true);
  const [clients,setClients]=useState([]);
  const [projects,setProjects]=useState([]);
  const [laudos,setLaudos]=useState([]);
  const [receivables,setReceivables]=useState([]);
  const [payables,setPayables]=useState([]);
  const loadAll=async()=>{
    setLoading(true);
    const [c,p,r,py]=await Promise.all([
      sb.from("clients").select("*").order("name"),
      sb.from("projects").select("*").order("created_at",{ascending:false}),
      sb.from("financials_receivables").select("*").order("due_date",{ascending:false}),
      sb.from("financials_payables").select("*").order("created_at",{ascending:false}),
    ]);
    setClients(c.data||[]);setProjects(p.data||[]);
    setReceivables(r.data||[]);setPayables(py.data||[]);
    setLoading(false);
  };
  useEffect(()=>{loadAll();},[]);
  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:C.bg}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:100,paddingTop:"calc(12px + env(safe-area-inset-top, 0px))"}}>
        <div style={{width:32,height:32,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:"#000",flexShrink:0}}>PL</div>
        <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:900,color:C.text}}>PLSilva Engenharia</p></div>
        <button onClick={loadAll} style={{background:"none",border:"none",color:C.textMuted,fontSize:20,cursor:"pointer",padding:4}}>↺</button>
      </div>
      <div style={{flex:1,padding:16,paddingBottom:80,overflowY:"auto"}}>
        {loading?<Loading/>:<>
          {page==="dashboard"&&<Dashboard clients={clients} projects={projects} laudos={laudos} receivables={receivables} payables={payables}/>}
          {page==="clientes"&&<Clients clients={clients} projects={projects} laudos={laudos} receivables={receivables} reload={loadAll}/>}
          {page==="projetos"&&<Projects projects={projects} clients={clients} receivables={receivables} reload={loadAll}/>}
          {page==="documentos"&&<Documentos projects={projects}/>}
          {page==="relatorios"&&<Relatorios receivables={receivables} payables={payables} projects={projects} clients={clients}/>}
          {page==="orcamentos"&&<Orcamentos clients={clients}/>}
          {page==="designer"&&<Designer projects={projects}/>}
          {page==="contratos"&&<Contratos clients={clients} projects={projects}/>}
          {page==="financeiro"&&<Financial receivables={receivables} payables={payables} clients={clients} projects={projects} reload={loadAll}/>}
        </>}
      </div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",overflowX:"auto",paddingBottom:"env(safe-area-inset-bottom, 0px)",zIndex:100}}>
        {NAV.map(item=>{const active=page===item.k;return(
          <button key={item.k} onClick={()=>setPage(item.k)} style={{flex:"0 0 auto",minWidth:60,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"8px 10px",border:"none",cursor:"pointer",background:"transparent",color:active?C.accent:C.textMuted,fontSize:9,fontWeight:active?700:500,gap:3,minHeight:56,borderTop:active?`2px solid ${C.accent}`:"2px solid transparent"}}>
            <span style={{fontSize:18}}>{item.ic}</span>
            <span style={{whiteSpace:"nowrap"}}>{item.l}</span>
          </button>
        );})}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
