<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLSilva Engenharia — ERP</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #f0f0f0; font-family: 'Inter', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  input, select, textarea, button { font-family: inherit; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const C = {
  bg:"#0a0a0a",surface:"#111111",surfaceHover:"#181818",border:"#222222",
  borderHover:"#333333",text:"#f0f0f0",textMuted:"#888888",textFaint:"#3a3a3a",
  accent:"#E8A020",accentDim:"#2a1a00",accentText:"#F5C060",
  success:"#22C55E",successBg:"#0a2e1a",warning:"#F59E0B",warningBg:"#2a1a00",
  danger:"#EF4444",dangerBg:"#2a0a0a",info:"#3B82F6",infoBg:"#0a1a3a",
  graphite:"#161616",white:"#ffffff"
};

const SC = {
  "Orçamento":{color:"#64748b",bg:"#1e2533"},"Contratado":{color:"#3B82F6",bg:"#0a1a3a"},
  "Em desenvolvimento":{color:"#8B5CF6",bg:"#1a0a3a"},"Revisão":{color:"#F59E0B",bg:"#2a1a00"},
  "Protocolado":{color:"#06B6D4",bg:"#001a2a"},"Em análise":{color:"#F97316",bg:"#2a1000"},
  "Aprovado":{color:"#22C55E",bg:"#0a2e1a"},"Concluído":{color:"#10B981",bg:"#0a2520"},
  "Levantamento":{color:"#64748b",bg:"#1e2533"},"Em projeto":{color:"#8B5CF6",bg:"#1a0a3a"},
  "DAT emitida":{color:"#06B6D4",bg:"#001a2a"},"Adequação":{color:"#F59E0B",bg:"#2a1a00"},
  "AVCB emitido":{color:"#22C55E",bg:"#0a2e1a"},
};

const fmt = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v);
const fmtD = d => d ? new Date(d+"T12:00:00").toLocaleDateString("pt-BR") : "-";
const TODAY = new Date();

const INIT = {
  clients:[
    {id:1,name:"Construtora Horizonte Ltda",type:"PJ",doc:"12.345.678/0001-90",phone:"(34) 99812-3456",email:"contato@horizonte.com.br",city:"Uberlândia",state:"MG",address:"Av. João Pinheiro, 800",obs:"Cliente premium."},
    {id:2,name:"Ricardo Alves Ferreira",type:"PF",doc:"123.456.789-00",phone:"(34) 98765-4321",email:"ricardo@email.com",city:"Uberlândia",state:"MG",address:"Rua das Acácias, 45",obs:""},
    {id:3,name:"Shopping Triângulo SA",type:"PJ",doc:"98.765.432/0001-10",phone:"(34) 3232-5500",email:"engenharia@triangulo.com.br",city:"Uberlândia",state:"MG",address:"Av. Rondon Pacheco, 4500",obs:"PPCI do shopping."},
    {id:4,name:"Hospital Santa Clara",type:"PJ",doc:"11.222.333/0001-44",phone:"(34) 3215-9000",email:"obras@santaclara.com.br",city:"Patos de Minas",state:"MG",address:"Rua Monteiro Lobato, 200",obs:"Ampliação UTI."},
  ],
  projects:[
    {id:1,code:"PRJ-2024-001",clientId:1,type:"PPCI",responsible:"Eng. Paulo Lima",value:45000,startDate:"2024-01-15",deadline:"2024-06-30",status:"Aprovado",description:"PPCI — Edifício Residencial Morada das Flores"},
    {id:2,code:"PRJ-2024-002",clientId:2,type:"Arquitetônico",responsible:"Arq. Sofia Castro",value:18000,startDate:"2024-03-01",deadline:"2024-09-15",status:"Em desenvolvimento",description:"Projeto arquitetônico residencial 280m²"},
    {id:3,code:"PRJ-2024-003",clientId:3,type:"PPCI",responsible:"Eng. Paulo Lima",value:120000,startDate:"2024-02-10",deadline:"2024-12-31",status:"Em análise",description:"Revisão PPCI — Shopping Triângulo"},
    {id:4,code:"PRJ-2024-004",clientId:4,type:"Estrutural",responsible:"Eng. Marcos Vidal",value:65000,startDate:"2024-04-01",deadline:"2025-03-31",status:"Contratado",description:"Estrutural ampliação UTI — Hospital Santa Clara"},
    {id:5,code:"PRJ-2024-005",clientId:1,type:"Hidrossanitário",responsible:"Eng. Ana Torres",value:22000,startDate:"2024-05-10",deadline:"2024-11-10",status:"Em desenvolvimento",description:"Hidrossanitário — Residencial Bosque Verde"},
  ],
  laudos:[
    {id:1,type:"Inspeção Predial",clientId:3,address:"Av. Rondon Pacheco, 4500",responsible:"Eng. Paulo Lima",surveyDate:"2024-05-20",deliveryDate:"2024-06-20",value:8500,status:"Em desenvolvimento"},
    {id:2,type:"SPDA",clientId:4,address:"Rua Monteiro Lobato, 200",responsible:"Eng. Marcos Vidal",surveyDate:"2024-06-01",deliveryDate:"2024-07-01",value:4200,status:"Concluído"},
    {id:3,type:"Estrutural",clientId:1,address:"Rua dos Ipês, 120",responsible:"Eng. Marcos Vidal",surveyDate:"2024-06-10",deliveryDate:"2024-07-10",value:6000,status:"Revisão"},
  ],
  pscip:[
    {id:1,clientId:3,address:"Av. Rondon Pacheco, 4500",area:42000,height:28,occupation:"Shopping Center",responsible:"Eng. Paulo Lima",pscipNumber:"PSCIP-2024-0891",status:"Em análise"},
    {id:2,clientId:1,address:"Rua das Flores, 1200",area:3600,height:45,occupation:"Residencial Multifamiliar",responsible:"Eng. Paulo Lima",pscipNumber:"PSCIP-2024-1023",status:"Aprovado"},
  ],
  obras:[
    {id:1,clientId:2,projectId:2,address:"Rua das Acácias, 45",responsible:"Eng. Ana Torres",visits:4,status:"Em andamento",pendencies:["Definição acabamentos internos","Aprovação planta prefeitura"]},
    {id:2,clientId:4,projectId:4,address:"Rua Monteiro Lobato, 200",responsible:"Eng. Marcos Vidal",visits:2,status:"Iniciando",pendencies:["Demolição parede divisória"]},
  ],
  financials:{
    receivables:[
      {id:1,clientId:1,projectId:1,description:"Parcela 3/3 — PRJ-2024-001",value:15000,dueDate:"2024-06-30",status:"Pendente"},
      {id:2,clientId:2,projectId:2,description:"Parcela 1/3 — PRJ-2024-002",value:6000,dueDate:"2024-05-15",status:"Recebido"},
      {id:3,clientId:3,projectId:3,description:"Sinal — PRJ-2024-003",value:30000,dueDate:"2024-06-15",status:"Recebido"},
      {id:4,clientId:4,projectId:4,description:"Parcela 1/4 — PRJ-2024-004",value:16250,dueDate:"2024-07-01",status:"Pendente"},
      {id:5,clientId:1,projectId:5,description:"Sinal — PRJ-2024-005",value:7333,dueDate:"2024-05-20",status:"Recebido"},
    ],
    payables:[
      {id:1,category:"Equipe",description:"Salários Junho",value:18000,dueDate:"2024-06-30",status:"Pendente"},
      {id:2,category:"Softwares",description:"Licença AutoCAD + Revit",value:890,dueDate:"2024-06-15",status:"Pago"},
      {id:3,category:"CREA",description:"Anuidade CREA-MG",value:720,dueDate:"2024-06-20",status:"Pago"},
      {id:4,category:"Impostos",description:"ISS + DAS Junho",value:4200,dueDate:"2024-07-05",status:"Pendente"},
      {id:5,category:"Terceiros",description:"Consultoria Elétrica",value:2500,dueDate:"2024-06-25",status:"Pendente"},
    ],
  },
};

const Badge = ({text}) => {
  const cfg=SC[text]||{color:"#888",bg:"#1a1a1a"};
  return <span style={{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:700,color:cfg.color,background:cfg.bg,border:`1px solid ${cfg.color}33`,whiteSpace:"nowrap"}}>{text}</span>;
};

const StatCard = ({label,value,sub,icon,color=C.accent,hl}) => (
  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",display:"flex",flexDirection:"column",gap:6,borderTop:hl?`2px solid ${color}`:`1px solid ${C.border}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:11,color:C.textMuted,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</span>
      <span style={{fontSize:18}}>{icon}</span>
    </div>
    <div style={{fontSize:22,fontWeight:800,color:C.text}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:C.textMuted}}>{sub}</div>}
  </div>
);

const Btn = ({children,onClick,style={},primary,small}) => (
  <button onClick={onClick} style={{background:primary?C.accent:C.border,color:primary?"#000":C.text,border:"none",borderRadius:8,padding:small?"7px 14px":"10px 18px",fontSize:small?12:13,fontWeight:700,cursor:"pointer",...style}}>{children}</button>
);

const Inp = ({value,onChange,placeholder,type="text"}) => (
  <input type={type} value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
    style={{width:"100%",padding:"10px 14px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:13,outline:"none",boxSizing:"border-box"}}
    onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}
  />
);

const Sel = ({value,onChange,options}) => (
  <select value={value||""} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",padding:"10px 14px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:13,outline:"none",cursor:"pointer"}}>
    {options.map(o=><option key={o.value||o} value={o.value!==undefined?o.value:o}>{o.label||o}</option>)}
  </select>
);

const Fld = ({label,children}) => (
  <div style={{marginBottom:14}}>
    <label style={{display:"block",fontSize:11,fontWeight:700,color:C.textMuted,marginBottom:5,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</label>
    {children}
  </div>
);

const G2 = ({children}) => <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>{children}</div>;

const Modal = ({title,onClose,children}) => (
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,width:"min(640px,96vw)",maxHeight:"88vh",overflowY:"auto",padding:28}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
        <h3 style={{margin:0,fontSize:17,fontWeight:800,color:C.text}}>{title}</h3>
        <button onClick={onClose} style={{background:C.border,border:"none",borderRadius:6,color:C.text,width:32,height:32,fontSize:18,cursor:"pointer"}}>×</button>
      </div>
      {children}
    </div>
  </div>
);

const Tbl = ({cols,rows}) => (
  <div style={{overflowX:"auto",borderRadius:10,border:`1px solid ${C.border}`}}>
    <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
      <thead>
        <tr style={{background:C.graphite}}>
          {cols.map((c,i)=><th key={i} style={{padding:"11px 14px",textAlign:"left",color:C.textMuted,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{c}</th>)}
        </tr>
      </thead>
      <tbody>
        {rows.map((row,i)=>(
          <tr key={i} style={{borderBottom:`1px solid ${C.border}`}} onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            {row.map((cell,j)=><td key={j} style={{padding:"12px 14px",color:C.text,verticalAlign:"middle"}}>{cell}</td>)}
          </tr>
        ))}
        {rows.length===0&&<tr><td colSpan={cols.length} style={{padding:32,textAlign:"center",color:C.textMuted}}>Nenhum registro</td></tr>}
      </tbody>
    </table>
  </div>
);

const PBar = ({value,max,color=C.accent}) => {
  const pct=Math.min(100,Math.round((value/max)*100));
  return <div style={{background:C.border,borderRadius:4,height:5}}><div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:4}}/></div>;
};

const Dashboard = ({data}) => {
  const pendRec=data.financials.receivables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const pendPay=data.financials.payables.filter(r=>r.status==="Pendente").reduce((s,r)=>s+r.value,0);
  const monRec=data.financials.receivables.filter(r=>r.status==="Recebido").reduce((s,r)=>s+r.value,0);
  const monExp=data.financials.payables.filter(r=>r.status==="Pago").reduce((s,r)=>s+r.value,0);
  const active=data.projects.filter(p=>!["Concluído","Orçamento"].includes(p.status));
  const monthData=[{m:"Jan",r:42000,d:22000},{m:"Fev",r:38000,d:19500},{m:"Mar",r:55000,d:24000},{m:"Abr",r:61000,d:21000},{m:"Mai",r:49500,d:23500},{m:"Jun",r:monRec,d:monExp}];
  const mx=Math.max(...monthData.flatMap(x=>[x.r,x.d]));
  return (
    <div>
      <div style={{marginBottom:28}}>
        <h1 style={{fontSize:26,fontWeight:900,color:C.text,margin:"0 0 4px"}}>Dashboard Executivo</h1>
        <p style={{color:C.textMuted,margin:0,fontSize:13}}>{TODAY.toLocaleDateString("pt-BR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(170px,1fr))",gap:14,marginBottom:28}}>
        <StatCard label="Projetos Ativos" value={active.length} sub="Em execução" icon="📐" hl/>
        <StatCard label="Laudos Pendentes" value={data.laudos.filter(l=>l.status!=="Concluído").length} sub="Em elaboração" icon="📋" color={C.info} hl/>
        <StatCard label="PSCIP CBMMG" value={data.pscip.filter(p=>p.status==="Em análise").length} sub="Em análise" icon="🔥" color={C.warning}/>
        <StatCard label="Aprovados" value={data.projects.filter(p=>p.status==="Aprovado").length} sub="Este ano" icon="✅" color={C.success}/>
        <StatCard label="Receita do Mês" value={fmt(monRec)} sub="Recebimentos" icon="💰" color={C.success} hl/>
        <StatCard label="Despesas do Mês" value={fmt(monExp)} sub="Pagamentos" icon="📤" color={C.danger}/>
        <StatCard label="A Receber" value={fmt(pendRec)} sub="Pendente" icon="📥" color={C.accentText} hl/>
        <StatCard label="A Pagar" value={fmt(pendPay)} sub="Pendente" icon="⚠️" color={C.warning}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:20,marginBottom:20}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 24px"}}>
          <h3 style={{margin:"0 0 18px",fontSize:14,fontWeight:800,color:C.text}}>Fluxo de Caixa — 2024</h3>
          <div style={{display:"flex",alignItems:"flex-end",gap:10,height:150}}>
            {monthData.map((m,i)=>(
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{display:"flex",gap:3,alignItems:"flex-end",height:120}}>
                  <div style={{width:16,borderRadius:"4px 4px 0 0",height:`${(m.r/mx)*112}px`,background:i===5?C.success:C.success+"99"}}/>
                  <div style={{width:16,borderRadius:"4px 4px 0 0",height:`${(m.d/mx)*112}px`,background:i===5?C.danger:C.danger+"99"}}/>
                </div>
                <span style={{fontSize:10,color:C.textMuted}}>{m.m}</span>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:16,marginTop:10}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:10,height:10,borderRadius:2,background:C.success}}/><span style={{fontSize:11,color:C.textMuted}}>Receitas</span></div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:10,height:10,borderRadius:2,background:C.danger}}/><span style={{fontSize:11,color:C.textMuted}}>Despesas</span></div>
          </div>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>⚡ Alertas de Vencimento</h3>
          {[...data.financials.receivables.filter(r=>r.status==="Pendente").map(r=>({text:`A receber: ${fmt(r.value)}`,sub:`Vence ${fmtD(r.dueDate)}`,color:C.success})),...data.financials.payables.filter(p=>p.status==="Pendente").map(p=>({text:`${p.description}: ${fmt(p.value)}`,sub:`Vence ${fmtD(p.dueDate)}`,color:C.warning}))].slice(0,5).map((a,i)=>(
            <div key={i} style={{padding:"9px 12px",borderRadius:8,background:C.bg,border:`1px solid ${a.color}33`,borderLeft:`3px solid ${a.color}`,marginBottom:8}}>
              <p style={{margin:"0 0 2px",fontSize:12,color:C.text,fontWeight:600}}>{a.text}</p>
              <p style={{margin:0,fontSize:11,color:C.textMuted}}>{a.sub}</p>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"20px 24px"}}>
        <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>Projetos em Andamento</h3>
        <Tbl cols={["Código","Cliente","Tipo","Responsável","Valor","Prazo","Status"]}
          rows={active.map(p=>{const cl=data.clients.find(c=>c.id===p.clientId);return[<span style={{fontFamily:"monospace",color:C.accent,fontSize:12}}>{p.code}</span>,cl?.name.split(" ").slice(0,2).join(" "),p.type,p.responsible.replace("Eng. ","").replace("Arq. ",""),<span style={{color:C.success,fontWeight:700}}>{fmt(p.value)}</span>,fmtD(p.deadline),<Badge text={p.status}/>];})}
        />
      </div>
    </div>
  );
};

const Clients = ({data,setData}) => {
  const [search,setSearch]=useState("");
  const [modal,setModal]=useState(false);
  const [sel,setSel]=useState(null);
  const [form,setForm]=useState({name:"",type:"PF",doc:"",phone:"",email:"",city:"",state:"MG",address:"",obs:""});
  const list=data.clients.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.doc.includes(search));
  const sf=k=>v=>setForm(p=>({...p,[k]:v}));
  const save=()=>{if(!form.name)return;setData(d=>({...d,clients:[...d.clients.filter(c=>c.id!==form.id),{...form,id:form.id||Date.now()}]}));setModal(false);setSel(null);};
  if(sel){
    const sp=data.projects.filter(p=>p.clientId===sel.id);
    const totalR=data.financials.receivables.filter(r=>r.clientId===sel.id&&r.status==="Recebido").reduce((s,r)=>s+r.value,0);
    return(<div>
      <button onClick={()=>setSel(null)} style={{background:"none",border:`1px solid ${C.border}`,color:C.textMuted,padding:"7px 14px",borderRadius:8,cursor:"pointer",marginBottom:22,fontSize:13}}>← Voltar</button>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:22}}>
        <div><h1 style={{fontSize:24,fontWeight:900,color:C.text,margin:"0 0 4px"}}>{sel.name}</h1><p style={{color:C.textMuted,margin:0,fontSize:13}}>{sel.doc}</p></div>
        <Btn primary onClick={()=>{setForm({...sel});setModal(true);}}>Editar</Btn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:22}}>
        <StatCard label="Projetos" value={sp.length} icon="📐"/>
        <StatCard label="Laudos" value={data.laudos.filter(l=>l.clientId===sel.id).length} icon="📋" color={C.info}/>
        <StatCard label="Total Recebido" value={fmt(totalR)} icon="💰" color={C.success}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:700,color:C.text}}>Contato</h3>
          {[["📞","Telefone",sel.phone],["📧","E-mail",sel.email],["📍","Endereço",sel.address],["🏙️","Cidade",`${sel.city}/${sel.state}`]].map(([ic,l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:12,color:C.textMuted}}>{ic} {l}</span><span style={{fontSize:12,color:C.text}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:700,color:C.text}}>Projetos</h3>
          {sp.map(p=>(<div key={p.id} style={{padding:"9px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{p.code}</p><p style={{margin:0,fontSize:11,color:C.textMuted}}>{p.type}</p></div>
            <Badge text={p.status}/>
          </div>))}
        </div>
      </div>
      {modal&&<Modal title="Editar Cliente" onClose={()=>setModal(false)}>
        <G2><Fld label="Nome"><Inp value={form.name} onChange={sf("name")}/></Fld><Fld label="Tipo"><Sel value={form.type} onChange={sf("type")} options={[{value:"PF",label:"Pessoa Física"},{value:"PJ",label:"Pessoa Jurídica"}]}/></Fld></G2>
        <G2><Fld label="CPF/CNPJ"><Inp value={form.doc} onChange={sf("doc")}/></Fld><Fld label="Telefone"><Inp value={form.phone} onChange={sf("phone")}/></Fld></G2>

  const DOCS=[{name:"Contrato_Assinado.pdf",folder:"Contrato",size:"2.4 MB",date:"2024-01-15",type:"pdf",ver:"v1"},{name:"Planta_Pavimento_Tipo.dwg",folder:"DWGs",size:"8.1 MB",date:"2024-03-10",type:"dwg",ver:"v3"},{name:"ART_Paulo_Lima.pdf",folder:"ARTs",size:"0.5 MB",date:"2024-01-20",type:"pdf",ver:"v1"},{name:"Memorial_Descritivo_v2.docx",folder:"Memoriais",size:"1.2 MB",date:"2024-04-05",type:"docx",ver:"v2"},{name:"Planta_Humanizada.pdf",folder:"PDFs",size:"4.8 MB",date:"2024-05-12",type:"pdf",ver:"v2"},{name:"Oficio_Prefeitura.pdf",folder:"Prefeitura",size:"0.8 MB",date:"2024-05-30",type:"pdf",ver:"v1"},{name:"Foto_Fachada_01.jpg",folder:"Fotos",size:"3.2 MB",date:"2024-03-15",type:"jpg",ver:"v1"},{name:"CBMMG_Protocolo.pdf",folder:"CBMMG",size:"1.1 MB",date:"2024-02-28",type:"pdf",ver:"v1"}];
  const TC={pdf:"#EF4444",dwg:"#3B82F6",docx:"#8B5CF6",jpg:"#F59E0B"};
  const ICONS={pdf:"📄",dwg:"📐",docx:"📝",jpg:"🖼️"};
  const display=folder==="Todos"?DOCS:DOCS.filter(d=>d.folder===folder);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}><h2 style={{fontSize:22,fontWeight:900,color:C.text,margin:0}}>Gestão Documental</h2><Btn primary>↑ Upload</Btn></div>
    <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:20}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
        <p style={{fontSize:11,color:C.textMuted,margin:"0 0 10px",fontWeight:700,textTransform:"uppercase"}}>Pastas</p>
        {FOLDERS.map(f=><button key={f} onClick={()=>setFolder(f)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"9px 12px",borderRadius:8,border:"none",cursor:"pointer",background:folder===f?C.accentDim:"transparent",color:folder===f?C.accentText:C.textMuted,fontSize:13,textAlign:"left",marginBottom:2,fontWeight:folder===f?700:400,borderLeft:folder===f?`3px solid ${C.accent}`:"3px solid transparent"}}><span>📁</span><span style={{flex:1}}>{f}</span>{f!=="Todos"&&<span style={{fontSize:11,color:C.textFaint}}>{DOCS.filter(d=>d.folder===f).length}</span>}</button>)}
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
        <h3 style={{margin:"0 0 16px",fontSize:14,fontWeight:800,color:C.text}}>{folder} ({display.length})</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12}}>
          {display.map((d,i)=><div key={i} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:14,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.borderHover} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}><div style={{width:34,height:34,borderRadius:8,background:(TC[d.type]||"#888")+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{ICONS[d.type]||"📄"}</div><span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:(TC[d.type]||"#888")+"33",color:TC[d.type]||"#888",fontWeight:700,textTransform:"uppercase"}}>{d.type}</span></div>
            <p style={{margin:"0 0 4px",fontSize:12,fontWeight:700,color:C.text,wordBreak:"break-word"}}>{d.name}</p>
            <p style={{margin:0,fontSize:11,color:C.textMuted}}>{d.size} · {fmtD(d.date)} · <span style={{color:C.info}}>{d.ver}</span></p>
          </div>)}
        </div>
      </div>
    </div>
  </div>);
};

const Users = () => {
  const USERS=[{name:"Paulo Lima",role:"Administrador",email:"paulo@plsilva.eng.br",init:"PL",color:C.accent},{name:"Sofia Castro",role:"Projetista",email:"sofia@plsilva.eng.br",init:"SC",color:C.info},{name:"Marcos Vidal",role:"Engenheiro",email:"marcos@plsilva.eng.br",init:"MV",color:C.success},{name:"Ana Torres",role:"Engenheiro",email:"ana@plsilva.eng.br",init:"AT",color:"#8B5CF6"},{name:"Carlos F.",role:"Financeiro",email:"financeiro@plsilva.eng.br",init:"CF",color:C.warning}];
  const RC={Administrador:{color:C.accent,bg:C.accentDim},Engenheiro:{color:C.success,bg:C.successBg},Projetista:{color:C.info,bg:C.infoBg},Financeiro:{color:C.warning,bg:C.warningBg}};
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}><h2 style={{fontSize:22,fontWeight:900,color:C.text,margin:0}}>Usuários & Permissões</h2><Btn primary>+ Convidar</Btn></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:14,marginBottom:24}}>
      {USERS.map((u,i)=>{const rc=RC[u.role]||{color:C.textMuted,bg:C.graphite};return(<div key={i} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:18}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}><div style={{width:44,height:44,borderRadius:"50%",background:u.color+"33",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,color:u.color}}>{u.init}</div><div><p style={{margin:0,fontSize:14,fontWeight:800,color:C.text}}>{u.name}</p><p style={{margin:0,fontSize:11,color:C.textMuted}}>{u.email}</p></div></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:11,padding:"4px 10px",borderRadius:6,background:rc.bg,color:rc.color,fontWeight:700}}>{u.role}</span><span style={{fontSize:11,color:C.success}}>● Ativo</span></div></div>);})}
    </div>
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
      <h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>Matriz de Permissões</h3>
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr style={{background:C.graphite}}><th style={{padding:"10px 14px",textAlign:"left",color:C.textMuted,borderBottom:`1px solid ${C.border}`}}>Módulo</th>{["Admin","Engenheiro","Projetista","Financeiro","Cliente"].map(r=><th key={r} style={{padding:"10px 12px",textAlign:"center",color:C.textMuted,borderBottom:`1px solid ${C.border}`,fontSize:11}}>{r}</th>)}</tr></thead>
        <tbody>{[["Dashboard","✅","✅","✅","✅","❌"],["Clientes","✅","👁️","👁️","✅","❌"],["Projetos","✅","✅","✅","👁️","👁️"],["Documentos","✅","✅","✅","👁️","👁️"],["Laudos","✅","✅","❌","❌","❌"],["PSCIP","✅","✅","👁️","❌","❌"],["Obras","✅","✅","❌","❌","❌"],["Financeiro","✅","❌","❌","✅","❌"],["Usuários","✅","❌","❌","❌","❌"]].map(([m,...ps])=>(<tr key={m} style={{borderBottom:`1px solid ${C.border}`}} onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><td style={{padding:"11px 14px",color:C.text,fontWeight:700,fontSize:13}}>{m}</td>{ps.map((p,i)=><td key={i} style={{padding:"11px 12px",textAlign:"center",fontSize:14}}>{p}</td>)}</tr>))}</tbody>
      </table></div>
    </div>
  </div>);
};

  const cl=data.clients[0];
  const projs=data.projects.filter(p=>p.clientId===cl.id);
  const recs=data.financials.receivables.filter(r=>r.clientId===cl.id);
  return(<div>
    <div style={{background:`linear-gradient(135deg,${C.accentDim} 0%,${C.graphite} 100%)`,borderRadius:16,padding:"28px",marginBottom:26,border:`1px solid ${C.accent}33`}}>
      <p style={{margin:"0 0 4px",fontSize:11,color:C.accentText,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Área do Cliente</p>
      <h2 style={{margin:"0 0 4px",fontSize:22,fontWeight:900,color:C.white}}>{cl.name}</h2>
      <p style={{margin:0,fontSize:13,color:C.accentText}}>Portal PLSilva Engenharia</p>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:22}}>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}><h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>Meus Projetos</h3>{projs.map(p=><div key={p.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{p.type}</p><p style={{margin:0,fontSize:11,color:C.textMuted,fontFamily:"monospace"}}>{p.code}</p></div><Badge text={p.status}/></div>)}</div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}><h3 style={{margin:"0 0 14px",fontSize:14,fontWeight:800,color:C.text}}>Meus Pagamentos</h3>{recs.map(r=><div key={r.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{fmt(r.value)}</p><p style={{margin:0,fontSize:11,color:C.textMuted}}>{fmtD(r.dueDate)}</p></div><span style={{fontSize:11,fontWeight:700,color:r.status==="Recebido"?C.success:C.warning}}>{r.status}</span></div>)}</div>

          <Btn small>↓ Baixar</Btn>
        </div>
      ))}
    </div>
  </div>);
};

const NAV=[{k:"dashboard",l:"Dashboard",ic:"📊"},{k:"clients",l:"Clientes",ic:"👥"},{k:"projects",l:"Projetos",ic:"📐"},{k:"documents",l:"Documentos",ic:"📁"},{k:"laudos",l:"Laudos",ic:"📋"},{k:"pscip",l:"PSCIP / CBMMG",ic:"🔥"},{k:"obras",l:"Obras",ic:"🏗️"},{k:"financial",l:"Financeiro",ic:"💰"},{k:"users",l:"Usuários",ic:"🔐"},{k:"portal",l:"Área do Cliente",ic:"👤"}];

function App(){
  const [page,setPage]=useState("dashboard");
  const [data,setData]=useState(INIT);
  const [open,setOpen]=useState(true);
  const W=open?220:60;
  return(
    <div style={{display:"flex",minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Inter',system-ui,sans-serif"}}>
      <aside style={{width:W,minHeight:"100vh",background:C.surface,borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",transition:"width 0.2s ease",overflow:"hidden",position:"sticky",top:0,maxHeight:"100vh"}}>
        <div style={{padding:open?"20px 16px 18px":"18px 12px",borderBottom:`1px solid ${C.border}`}}>
          {open?(<div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:34,height:34,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#000",flexShrink:0}}>PL</div><div><p style={{margin:0,fontSize:14,fontWeight:900,color:C.text}}>PLSilva</p><p style={{margin:0,fontSize:9,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.1em"}}>Engenharia</p></div></div>):(<div style={{width:34,height:34,borderRadius:8,background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#000"}}>PL</div>)}
        </div>
        <nav style={{flex:1,padding:"10px 6px",overflowY:"auto"}}>
          {NAV.map(item=>{const active=page===item.k;return(<button key={item.k} onClick={()=>setPage(item.k)} title={!open?item.l:""} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:open?"9px 12px":"9px 0",borderRadius:8,border:"none",cursor:"pointer",textAlign:"left",background:active?C.accentDim:"transparent",color:active?C.accentText:C.textMuted,fontSize:12,fontWeight:active?700:500,marginBottom:2,justifyContent:open?"flex-start":"center",borderLeft:active?`3px solid ${C.accent}`:"3px solid transparent"}} onMouseEnter={e=>{if(!active){e.currentTarget.style.background=C.surfaceHover;e.currentTarget.style.color=C.text;}}} onMouseLeave={e=>{if(!active){e.currentTarget.style.background="transparent";e.currentTarget.style.color=C.textMuted;}}}><span style={{fontSize:16,flexShrink:0}}>{item.ic}</span>{open&&<span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.l}</span>}</button>);})}
        </nav>
        <div style={{padding:"10px 6px",borderTop:`1px solid ${C.border}`}}>
          <button onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",justifyContent:open?"flex-start":"center",gap:10,width:"100%",padding:"9px 12px",borderRadius:8,border:"none",cursor:"pointer",background:"transparent",color:C.textMuted,fontSize:12}} onMouseEnter={e=>e.currentTarget.style.background=C.surfaceHover} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <span style={{fontSize:14}}>{open?"◀":"▶"}</span>{open&&<span>Recolher</span>}
          </button>
        </div>
      </aside>
      <main style={{flex:1,padding:"28px 32px",overflowY:"auto",minWidth:0}}>
        {page==="dashboard"&&<Dashboard data={data}/>}
        {page==="clients"&&<Clients data={data} setData={setData}/>}
        {page==="projects"&&<Projects data={data} setData={setData}/>}
        {page==="documents"&&<Documents data={data}/>}
        {page==="laudos"&&<Laudos data={data} setData={setData}/>}
        {page==="pscip"&&<PSCIP data={data} setData={setData}/>}
        {page==="obras"&&<Obras data={data}/>}
        {page==="financial"&&<Financial data={data}/>}
        {page==="users"&&<Users/>}
        {page==="portal"&&<Portal data={data}/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
